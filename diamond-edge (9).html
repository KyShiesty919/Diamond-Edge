// CONFIDENCE ENGINE
// ═══════════════════════════════════════════
function probToConf(p){
  const x=Math.max(0.50,Math.min(0.95,p));
  return Math.round(Math.min(95,Math.max(50,50+(x-0.50)*2.2*100*Math.pow((x-0.49),0.45))));
}
function blendWithMarket(modelP,marketP){
  if(!marketP||marketP<0.3||marketP>0.95)return modelP;
  const blended=modelP*0.60+marketP*0.40;
  const agree=(modelP>0.5)===(marketP>0.5);
  if(agree){const gap=Math.abs(modelP-0.5)+Math.abs(marketP-0.5);return Math.min(0.92,blended+gap*0.08);}
  return blended;
}
function cc(v){return v>=78?'#22d3a5':v>=66?'#fbbf24':'#f87171';}
function cl(v){return v>=78?'HIGH':v>=66?'MED':'LOW';}
function toA(p){return p>=0.5?`-${Math.round((p/(1-p))*100)}`:`+${Math.round(((1-p)/p)*100)}`;}
function a2p(o){if(!o)return null;return o>0?100/(o+100):Math.abs(o)/(Math.abs(o)+100);}
function edgeCalc(mp,mo){const ip=a2p(mo);if(!ip)return null;return((mp-ip)*100).toFixed(1);}
function kellyOdds(prob,amo){if(!amo||amo===0)return 0;const dec=amo>0?(amo/100)+1:(100/Math.abs(amo))+1;const b=dec-1,k=(b*prob-(1-prob))/b;return Math.round(Math.max(0,Math.min(0.20,k))*1000)/10;}

async function fetchSchedule(){
  const date=todayET();
  const data=await mlb(`/api/v1/schedule?sportId=1&date=${date}&hydrate=probablePitcher,team,weather,officials`);
  const games=[];
  for(const d of(data.dates||[])){for(const g of(d.games||[])){
    const st=g.status?.abstractGameState;
    if(st!=='Preview'&&st!=='Pre-Game'&&st!=='Scheduled')continue;
    const umpire=(g.officials||[]).find(o=>o.officialType==='Home Plate')?.official?.fullName||null;
    games.push({away:g.teams?.away?.team?.name||'',home:g.teams?.home?.team?.name||'',awayPId:g.teams?.away?.probablePitcher?.id||null,homePId:g.teams?.home?.probablePitcher?.id||null,awayPName:g.teams?.away?.probablePitcher?.fullName||null,homePName:g.teams?.home?.probablePitcher?.fullName||null,awayTId:g.teams?.away?.team?.id||null,homeTId:g.teams?.home?.team?.id||null,weather:g.weather||null,umpire,time:g.gameDate?new Date(g.gameDate).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'}):'TBD'});
  }}
  return{games,date};
}

async function fetchPitcherStats(id){
  if(!id)return null;
  try{
    const data=await mlb(`/api/v1/people/${id}/stats?stats=season,gameLog&group=pitching&season=2026&limit=10`);
    const season=data.stats?.find(s=>s.type?.displayName==='season')?.splits?.[0]?.stat;
    const allLogs=data.stats?.find(s=>s.type?.displayName==='gameLog')?.splits||[];
    const startLogs=allLogs.filter(l=>parseFloat(l.stat?.inningsPitched||0)>=3.0&&parseInt(l.stat?.gamesStarted||0)>=1);
    let l3ip=0,l3er=0;
    for(const l of startLogs.slice(0,3)){const ip=parseFloat(l.stat?.inningsPitched)||0;l3ip+=ip;l3er+=parseFloat(l.stat?.earnedRuns)||0;}
    const l3eraRaw=l3ip>0?parseFloat(((l3er/l3ip)*9).toFixed(2)):null;
    const seasonERA=parseFloat(season?.era)||4.20;
    let l3era=null;
    if(l3eraRaw!==null){
      const nS=Math.min(startLogs.slice(0,3).length,3);
      const rw=[0,0.25,0.40,0.60][nS];
      l3era=parseFloat((l3eraRaw*rw+seasonERA*(1-rw)).toFixed(2));
    }
    // Rest days — check multiple possible date fields from MLB API
    let restDays=5;
    const lastStart=startLogs[0]||allLogs[0];
    if(lastStart){
      // MLB API returns date in different fields depending on endpoint
      const dateStr=lastStart.date||lastStart.gameDate||lastStart.stat?.date||null;
      if(dateStr){
        try{
          const last=new Date(dateStr.includes('T')?dateStr:dateStr+'T12:00:00');
          const now=new Date();
          const days=Math.round((now-last)/(1000*60*60*24));
          if(days>=1&&days<=14)restDays=days;
        }catch{}
      }
    }
    const restAdj=restDays<=3?-0.18:restDays===4?-0.07:restDays>=7?0.06:0;
    const fi_era=seasonERA?parseFloat((seasonERA*0.95).toFixed(2)):4.0;
    if(!season)return null;
    const era=parseFloat(season.era)||null,whip=parseFloat(season.whip)||null,k9=parseFloat(season.strikeoutsPer9Inn)||null,bb9=parseFloat(season.walksPer9Inn)||null;
    const fip=era&&bb9&&k9?parseFloat((era+(bb9-k9)*0.15).toFixed(2)):null;
    let homeERA=era,awayERA=era;
    try{
      const sp=await mlb(`/api/v1/people/${id}/stats?stats=statSplits&group=pitching&season=2026&sitCodes=h,a`);
      const hs=sp.stats?.[0]?.splits?.find(s=>s.split?.code==='h')?.stat;
      const as2=sp.stats?.[0]?.splits?.find(s=>s.split?.code==='a')?.stat;
      if(hs?.era)homeERA=parseFloat(hs.era);if(as2?.era)awayERA=parseFloat(as2.era);
    }catch{}
    return{era,whip,k9,bb9,fip,fi_era,l3era,restDays,restAdj,homeERA,awayERA,id};
  }catch{return null;}
}

async function fetchTeamStats(id){

  try{
    const[hit,pit]=await Promise.all([mlb(`/api/v1/teams/${id}/stats?stats=season&group=hitting&season=2026`),mlb(`/api/v1/teams/${id}/stats?stats=season&group=pitching&season=2026`)]);

let savantTeamCache=null,savantPitcherCache=null;

async function fetchSavantTeams(){
  if(savantTeamCache)return savantTeamCache;
  try{
    // Baseball Savant team offense leaderboard — xwOBA, barrel%, hard hit%
    const url='https://baseballsavant.mlb.com/leaderboard/custom?year=2026&type=batter&filter=&sort=4&sortDir=desc&min=1&selections=xba,xslg,xwoba,xobp,barrel_batted_rate,hard_hit_percent&chart=false&x=xba&y=xba&r=no&chartType=beeswarm&csv=true';
    const r=await fetch(url,{signal:AbortSignal.timeout(8000)});
    if(!r.ok)return null;
    const text=await r.text();
    const lines=text.trim().split('\n');
    const headers=lines[0].split(',').map(h=>h.replace(/"/g,'').trim().toLowerCase());
    const map={};
    for(const line of lines.slice(1)){
      const vals=line.split(',').map(v=>v.replace(/"/g,'').trim());
      const row={};headers.forEach((h,i)=>row[h]=vals[i]);
      const tid=parseInt(row['team_id']||row['player_id']);
      const abb=row['team_abbrev']||row['team'];
      if(abb){
        if(!map[abb])map[abb]={xwoba:0,barrel:0,hardHit:0,n:0};
        map[abb].xwoba+=parseFloat(row['xwoba']||row['xwobacon']||0);
        map[abb].barrel+=parseFloat(row['barrel_batted_rate']||row['brl_percent']||0);
        map[abb].hardHit+=parseFloat(row['hard_hit_percent']||row['hard_hit']||0);
        map[abb].n++;
      }
    }
    // Average per team
    const result={};
    for(const[abb,d] of Object.entries(map)){
      if(d.n>0)result[abb]={xwoba:d.xwoba/d.n,barrel:d.barrel/d.n,hardHit:d.hardHit/d.n};
    }
    savantTeamCache=result;
    return result;
  }catch(e){console.warn('Savant teams:',e);return null;}
}

async function fetchStandings(){
  try{
    const data=await mlb('/api/v1/standings?leagueId=103,104&season=2026&standingsTypes=regularSeason');
    const map={};
    for(const rec of(data.records||[])){for(const t of(rec.teamRecords||[])){
      const rd=t.runDifferential||0,gp=(t.wins||0)+(t.losses||0);
      const rdpg=gp>0?rd/gp:0;
      // NEW: run-differential-weighted Elo — rdpg has bigger effect than binary win%
      const elo=Math.round(1500+(parseFloat(t.winningPercentage||'.500')-0.5)*350+rdpg*28);
      map[t.team.id]={wPct:parseFloat(t.winningPercentage||'.500'),wins:t.wins||0,losses:t.losses||0,streak:t.streak?.streakNumber||0,streakType:t.streak?.streakType||'W',runDiff:rd,rdpg,elo};
    }}
    return map;
  }catch{return{};}
}

let oddsSnap={};
async function fetchOdds(){
  let fresh=[],freshF5=[];
  try{
    // Main markets — h2h, spreads, totals
    fresh=await oddsApi(`/v4/sports/baseball_mlb/odds?apiKey=${ODDS_KEY}&regions=us&markets=h2h,spreads,totals&oddsFormat=american&bookmakers=${BOOKS.join(',')}`)||[];
  }catch(e){console.warn('Odds main:',e);}
  try{
    // F5 lines — separate call, optional
    freshF5=await oddsApi(`/v4/sports/baseball_mlb/odds?apiKey=${ODDS_KEY}&regions=us&markets=h2h_1st_5_innings&oddsFormat=american&bookmakers=fanduel,draftkings`)||[];
  }catch(e){console.warn('Odds F5:',e);}
  // Merge F5 data into main data by game id
  const f5Map={};
  for(const g of freshF5){
    f5Map[g.id]={away:g.away_team,home:g.home_team,bookmakers:g.bookmakers};
  }
  const movements={};
  for(const g of fresh){
    const key=g.id;
    // Attach F5 data if available
    g._f5=f5Map[key]||null;
    if(oddsSnap[key]){
      const prev=oddsSnap[key],moves=[];
      for(const bm of(g.bookmakers||[])){
        const pb=prev[bm.key];if(!pb)continue;
        for(const mkt of(bm.markets||[])){
          if(mkt.key!=='h2h')continue;
          for(const o of(mkt.outcomes||[])){
            const pp=pb[o.name];
            if(pp&&Math.abs(o.price-pp)>=5)moves.push(`${BNAMES[bm.key]||bm.key}: ${o.name} ${pp>0?'+':''}${pp}→${o.price>0?'+':''}${o.price}`);
          }
        }
      }
      if(moves.length)movements[key]=moves;
    }
    const snap={};
    for(const bm of(g.bookmakers||[])){
      snap[bm.key]={};
      for(const mkt of(bm.markets||[])){
        if(mkt.key==='h2h')for(const o of(mkt.outcomes||[]))snap[bm.key][o.name]=o.price;
      }
    }
    oddsSnap[key]=snap;
  }
  return{data:fresh,movements};
}

function findOdds(od,away,home){if(!od?.length)return null;const n=s=>s.toLowerCase().replace(/\s+/g,'').replace('athletics','as');const aN=n(away),hN=n(home);return od.find(g=>{const ta=n(g.away_team||''),th=n(g.home_team||'');return(ta.includes(aN.slice(0,6))||aN.includes(ta.slice(0,6)))&&(th.includes(hN.slice(0,6))||hN.includes(th.slice(0,6)));});}

function parseOdds(go,away,home){
  if(!go)return{ml:{},rl:{},total:{},f5:{}};
  const ml={},rl={},total={},f5={};
  const hLast=home.split(' ').slice(-1)[0].toLowerCase();
  const isH=o=>o.name===home||o.name.toLowerCase().includes(hLast);
  for(const bm of(go.bookmakers||[])){const k=bm.key;for(const mkt of(bm.markets||[])){
    if(mkt.key==='h2h')for(const o of(mkt.outcomes||[])){if(!ml[k])ml[k]={};if(isH(o))ml[k].home=o.price;else ml[k].away=o.price;}
    if(mkt.key==='spreads')for(const o of(mkt.outcomes||[])){if(isH(o))rl[k]={price:o.price,point:o.point};else rl[k+'_a']={price:o.price,point:o.point};}
    if(mkt.key==='totals')for(const o of(mkt.outcomes||[])){if(!total[k])total[k]={};total[k][o.name.toLowerCase()]={price:o.price,point:o.point};}
    if(mkt.key==='h2h_h1'||mkt.key==='h2h_1st_5_innings')for(const o of(mkt.outcomes||[])){if(!f5[k])f5[k]={};if(isH(o))f5[k].home=o.price;else f5[k].away=o.price;}
  }}
  // F5 from separately fetched data
  if(go._f5){for(const bm of(go._f5.bookmakers||[])){const k=bm.key;for(const mkt of(bm.markets||[])){if(mkt.key==='h2h_1st_5_innings'||mkt.key==='h2h_h1')for(const o of(mkt.outcomes||[])){if(!f5[k])f5[k]={};if(isH(o))f5[k].home=o.price;else f5[k].away=o.price;}}}}
  return{ml,rl,total,f5};
}

// NEW: Extract actual total line from odds
function getMarketTotalLine(totalOdds){
  for(const v of Object.values(totalOdds)){
    const over=v['over']||v['Over'];
    if(over?.point)return parseFloat(over.point);
  }
  return null;
}

function getMarketConsensus(oddsMap,side){
  const probs=[];
  for(const v of Object.values(oddsMap)){const price=side==='home'?v.home:v.away;const p=a2p(price);if(p&&p>0.1&&p<0.99)probs.push(p);}
  if(!probs.length)return null;
  return probs.reduce((a,b)=>a+b,0)/probs.length*0.955;
}
function getTotalMktConsensus(totalOdds,side){
  const probs=[];
  for(const v of Object.values(totalOdds)){const o=v[side];if(!o)continue;const p=a2p(o.price);if(p&&p>0.1&&p<0.99)probs.push(p);}
  if(!probs.length)return null;
  return probs.reduce((a,b)=>a+b,0)/probs.length*0.955;
}

let appGames=[],appStandings={},appOddsData={data:[],movements:{}},curFilter='all',curTab='lines';

async function init(){
  setStatus('loading','⟳ LOADING','CONNECTING...');
  setBanner('loading','⏳ Connecting to MLB + Odds APIs...');
  let schedGames=[],schedDate='';
  try{
    const{games,date}=await fetchSchedule();
    schedGames=games;schedDate=date;
    setStatus('partial','◑ LIVE SCHEDULE','ENRICHING...');
    setBanner('partial','✓ Schedule loaded — fetching all data layers...');
    populateGames(schedGames,schedDate);
  }catch(e){
    const fb=getFallback();schedGames=fb.games;schedDate=fb.date;
    setStatus('offline','⚠ OFFLINE','FALLBACK DATA');
    setBanner('offline','⚠ MLB API unreachable — using fallback slate');
    appGames=schedGames.map(g=>({...g}));populateGames(appGames,schedDate);populatePlayers();return;
  }
  // Fetch Savant data first (fast, cached after first load), then enrich games with everything
  const[standings,oddsResult,savantTeams,savantPitchers]=await Promise.all([fetchStandings(),fetchOdds(),fetchSavantTeams(),fetchSavantPitchers()]);
  appStandings=standings;appOddsData=oddsResult;
  const enriched=await Promise.all(schedGames.map(g=>enrichGame(g,savantTeams,savantPitchers,null)));
  appGames=enriched;
  const hasLive=enriched.some(g=>g.awayLiveSP||g.homeLiveSP||g.awayTS);
  const hasOdds=oddsResult.data&&oddsResult.data.length>0;
  setStatus(hasLive?'live':'partial',hasLive?'● LIVE DATA':'◑ PARTIAL',hasOdds?'MLB + ODDS API':'MLB API');
  const hasSavant=savantTeams&&Object.keys(savantTeams).length>0;
setBanner(hasLive?'live':'partial',`✅ ${hasLive?'Live MLB data active':'Schedule loaded'}${hasOdds?' · '+oddsResult.data.length+' games':''}${hasSavant?' · Statcast xERA/xwOBA/Barrel LIVE':' · Statcast loading...'}${hasOdds?' · Live lines · F5':''}`);
  populateGames(appGames,schedDate);populatePlayers();
}

async function enrichGame(g,savantTeams,savantPitchers){
  try{
    const[aS,hS,aT,hT,aBP,hBP,aLQ,hLQ,aInj,hInj,aRoll,hRoll]=await Promise.all([
      fetchPitcherStats(g.awayPId),fetchPitcherStats(g.homePId),
      fetchTeamStats(g.awayTId),fetchTeamStats(g.homeTId),
      fetchBullpenFatigue(g.awayTId),fetchBullpenFatigue(g.homeTId),
      fetchLineupQ(g.awayTId),fetchLineupQ(g.homeTId),
      fetchInjuries(g.awayTId),fetchInjuries(g.homeTId),
      fetchRollingOffense(g.awayTId),fetchRollingOffense(g.homeTId),
    ]);
    const[avh,hva]=await Promise.all([fetchPitcherVsTeam(g.awayPId,g.homeTId),fetchPitcherVsTeam(g.homePId,g.awayTId)]);
    // Statcast data
    const awaySavant=getTeamSavant(savantTeams,g.awayTId);
    const homeSavant=getTeamSavant(savantTeams,g.homeTId);
    const awayPSavant=savantPitchers&&aS?.id?savantPitchers[String(aS.id)]||null:null;
    const homePSavant=savantPitchers&&hS?.id?savantPitchers[String(hS.id)]||null:null;
    return{...g,awayLiveSP:aS,homeLiveSP:hS,awayTS:aT,homeTS:hT,awayBP:aBP||0,homeBP:hBP||0,awayLQ:aLQ||1.0,homeLQ:hLQ||1.0,awayInj:aInj||[],homeInj:hInj||[],awayRoll:aRoll||null,homeRoll:hRoll||null,awayVsHome:avh,homeVsAway:hva,awayLiveName:g.awayPName,homeLiveName:g.homePName,awaySavant,homeSavant,awayPSavant,homePSavant};
  }catch{
    return{...g,awayBP:0,homeBP:0,awayLQ:1.0,homeLQ:1.0,awayInj:[],homeInj:[],awayRoll:null,homeRoll:null,awayVsHome:null,homeVsAway:null,awaySavant:null,homeSavant:null,awayPSavant:null,homePSavant:null};
  }
}

  if(F[today])return{games:F[today],date:today};

function mSP(base,ln,live,isHome){
  if(!live)return{...base,effectiveERA:base.era,restAdj:0,restDays:5};
  const era=live.era??base.era,whip=live.whip??base.whip,k9=live.k9??base.k9,bb9=live.bb9??base.bb9;
  const fip=era&&bb9&&k9?parseFloat((era+(bb9-k9)*0.15).toFixed(2)):base.fip;
  const fi_era=live.fi_era??base.fi_era;
  const l3era=live.l3era??null;
  const restAdj=live.restAdj??0;
  const restDays=live.restDays??5;
  const homeERA=live.homeERA??era,awayERA=live.awayERA??era;
  const splitERA=isHome?homeERA:awayERA;
  let effectiveERA=era;
  if(l3era){effectiveERA=era*0.40+l3era*0.30+splitERA*0.30;}
  else{effectiveERA=era*0.55+splitERA*0.45;}
  effectiveERA=parseFloat(Math.max(1.5,effectiveERA-restAdj*0.3).toFixed(2));
  const nrfi=fi_era?Math.min(0.78,Math.max(0.42,base.nrfi+(base.fi_era-fi_era)*0.018)):base.nrfi;
  return{...base,name:ln||base.name,era,whip,k9,bb9,fip,fi_era,l3era,effectiveERA,restAdj,restDays,homeERA,awayERA,nrfi,live:true};
}

function analyzeGame(g){
  const{away,home,awayLiveSP,homeLiveSP,awayTS,homeTS,awayBP=0,homeBP=0,awayLQ=1.0,homeLQ=1.0,awayInj=[],homeInj=[],awayRoll,homeRoll,awayVsHome,homeVsAway,awayLiveName,homeLiveName,awayTId,homeTId,weather,umpire,awaySavant,homeSavant,awayPSavant,homePSavant}=g;
  const A=TB[away]||TBD2,H=TB[home]||TBD2;
  const AS=mSP(SPB[away]||DSP,awayLiveName,awayLiveSP,false);
  const HS=mSP(SPB[home]||DSP,homeLiveName,homeLiveSP,true);
  const park=PARKS[home]||{f:1.0,type:'Neutral',windSensitive:false};
  const dome=DOMES.includes(home);
  const ump=UMPIRES[umpire]||DEF_UMP;


  // ─── MARKET-FIRST ENGINE v13 ───────────────────────────────────────────
  // Step 1: Get live odds first — market IS the power rating
  const go=findOdds(appOddsData.data||[],away,home),po=parseOdds(go,away,home);
  const movements=go?appOddsData.movements?.[go.id]||[]:[];

  // Step 2: Extract market implied probabilities (devigged)
  const rawHomeML=getMarketConsensus(po.ml,'home');
  const rawAwayML=getMarketConsensus(po.ml,'away');
  // Devig: normalize so they sum to 1.0
  let mktHomeP=0.5,mktAwayP=0.5;
  if(rawHomeML&&rawAwayML){
    const total=rawHomeML+rawAwayML;
    mktHomeP=rawHomeML/total;
    mktAwayP=rawAwayML/total;
  } else if(rawHomeML){
    mktHomeP=rawHomeML;mktAwayP=1-rawHomeML;
  } else if(rawAwayML){
    mktAwayP=rawAwayML;mktHomeP=1-rawAwayML;
  }
  const hasMarket=rawHomeML||rawAwayML;

  // ─── STATCAST QUALITY METRICS ────────────────────────────────────────────
  const LG_XWOBA=0.315,LG_BARREL=7.5,LG_HARDHIT=38.0,LG_XERA=4.10;
  const aXwoba=awaySavant?.xwoba||null,hXwoba=homeSavant?.xwoba||null;
  const aBarrel=awaySavant?.barrel||null,hBarrel=homeSavant?.barrel||null;
  const aXera=awayPSavant?.xera||null,hXera=homePSavant?.xera||null;
  const aBarrelAllowed=awayPSavant?.barrelAllowed||null,hBarrelAllowed=homePSavant?.barrelAllowed||null;
  const aHardHitAllowed=awayPSavant?.hardHitAllowed||null,hHardHitAllowed=homePSavant?.hardHitAllowed||null;
  // Luck-adjusted pitcher ERA: blend ERA + xERA + FIP
  let aERA_adj=AS.effectiveERA,hERA_adj=HS.effectiveERA;
  if(aXera)aERA_adj=parseFloat((AS.effectiveERA*0.45+aXera*0.35+AS.fip*0.20).toFixed(2));
  if(hXera)hERA_adj=parseFloat((HS.effectiveERA*0.45+hXera*0.35+HS.fip*0.20).toFixed(2));
  // xERA vs ERA divergence — market uses ERA, we use xERA
  const aERAvsX=aXera?(AS.era-aXera):0,hERAvsX=hXera?(HS.era-hXera):0;
  // Offensive quality — xwOBA over OPS
  const aOffScore=aXwoba?(aXwoba/LG_XWOBA):(awayTS?.ops??0.720)/0.730;
  const hOffScore=hXwoba?(hXwoba/LG_XWOBA):(homeTS?.ops??0.720)/0.730;
  // Barrel matchup: high-barrel offense vs barrel-prone pitcher
  const aBarrelEdge=(aBarrel&&aBarrelAllowed)?((aBarrel-LG_BARREL)*(aBarrelAllowed-8.5))/100:0;
  const hBarrelEdge=(hBarrel&&hBarrelAllowed)?((hBarrel-LG_BARREL)*(hBarrelAllowed-8.5))/100:0;

  // ─── SITUATIONAL EDGES ───────────────────────────────────────────────────
  let homeAdj=0,awayAdj=0;
  const leagueAvg=4.10;
  // A: Pitcher xERA/FIP edge — our best quality signal
  const aSPedge=(leagueAvg-aERA_adj)/leagueAvg*0.09;
  const hSPedge=(leagueAvg-hERA_adj)/leagueAvg*0.09;
  awayAdj+=aSPedge;homeAdj+=hSPedge;
  // B: ERA vs xERA luck divergence — market prices ERA, we know better
  awayAdj+=Math.max(-0.03,Math.min(0.03,aERAvsX*0.015));
  homeAdj+=Math.max(-0.03,Math.min(0.03,hERAvsX*0.015));
  // C: Barrel matchup quality
  awayAdj+=aBarrelEdge*0.006;homeAdj+=hBarrelEdge*0.006;
  // D: xwOBA offensive quality
  awayAdj+=(aOffScore-1.0)*0.04;homeAdj+=(hOffScore-1.0)*0.04;
  // E: Ace multiplier
  awayAdj+=AS.ace>=2?0.04:AS.ace===1?0.02:AS.ace===-1?-0.03:0;
  homeAdj+=HS.ace>=2?0.04:HS.ace===1?0.02:HS.ace===-1?-0.03:0;
  // F: Rest days
  awayAdj+=(AS.restAdj||0)*0.04;homeAdj+=(HS.restAdj||0)*0.04;
  // G: Bullpen fatigue
  awayAdj+=awayBP>0.5?-0.025:awayBP>0.3?-0.012:0;
  homeAdj+=homeBP>0.5?-0.025:homeBP>0.3?-0.012:0;
  // H: Rolling offense (L7 vs season)
  const aSeasonRPG=awayTS?.rpg??4.3,hSeasonRPG=homeTS?.rpg??4.3;
  const aL7RPG=awayRoll?.rpg??aSeasonRPG,hL7RPG=homeRoll?.rpg??hSeasonRPG;
  awayAdj+=awayRoll?.rpg?(aL7RPG-aSeasonRPG)/aSeasonRPG*0.04:0;
  homeAdj+=homeRoll?.rpg?(hL7RPG-hSeasonRPG)/hSeasonRPG*0.04:0;
  // I: Injury report
  const injPA=Math.min(0.08,awayInj.length*0.02),injPH=Math.min(0.08,homeInj.length*0.02);
  awayAdj-=injPA*0.5;homeAdj-=injPH*0.5;
  // J: Series H2H
  const h2h=H.h2h?.[away]||0;
  homeAdj+=h2h*0.04;awayAdj-=h2h*0.04;
  // K: Run differential per game
  const aSt=appStandings[awayTId],hSt=appStandings[homeTId];
  const aElo=aSt?.elo??1500,hElo=hSt?.elo??1500;
  const aRDpg=aSt?.rdpg??0,hRDpg=hSt?.rdpg??0;
  awayAdj+=Math.max(-0.03,Math.min(0.03,aRDpg/10));
  homeAdj+=Math.max(-0.03,Math.min(0.03,hRDpg/10));
  // L: Career pitcher vs opponent
  let awayH2HNote=null,homeH2HNote=null;

}

function ppHTML(r){
  if(r.ppLine==null)return'';
  const en=parseFloat(r.ppEdge||0),pc=r.pick==='OVER'?'pp-over':'pp-under';
  return`<div class="fbox"><div class="fbox-title">PRIZEPICKS COMPARISON</div><table class="pp-table"><thead><tr><th>PLAYER</th><th>PROP</th><th>PP LINE</th><th>PROJ</th><th>PICK</th><th>EDGE</th></tr></thead><tbody><tr><td>${r.player}</td><td>${r.prop}</td><td>${r.ppLine}</td><td>${r.stat.split(' ')[0]}</td><td class="${pc}">${r.pick}</td><td class="${en>5?'pp-edge':''}">${en>0?'+':''}${r.ppEdge}%</td></tr></tbody></table>${en>5?`<div style="font-size:10px;color:var(--yellow);margin-top:8px;font-family:monospace">⚡ Strong PrizePicks edge</div>`:''}</div>`;
}

function runGame(){
  const idx=parseInt(document.getElementById('gameSelect').value);if(isNaN(idx))return;
  const btn=document.getElementById('btnAnalyze');btn.textContent='⟳  ANALYZING...';btn.className='btn loading';btn.disabled=true;
  setTimeout(()=>{const g=appGames[idx];if(!g){btn.textContent='▶  GENERATE PICKS + LIVE ODDS';btn.className='btn red';btn.disabled=false;return;}const r=analyzeGame(g);renderGame(r);btn.textContent='▶  GENERATE PICKS + LIVE ODDS';btn.className='btn red';btn.disabled=false;},80);
}

function renderGame(r){
  const best=r.bestBet,mlK=kellyOdds(r.mlProb,parseInt(r.mlOdds));
  const skipHTML=r.allLow?`<div class="skip-banner">⚠ ALL BETS LOW CONFIDENCE — Coin flip game. Consider skipping or waiting for better value.</div>`:'';
  const html=`
    ${injuryHTML(r.awayInj,r.homeInj,r.away,r.home)}
    ${lmHTML(r.movements)}
    ${skipHTML}
    <div class="card">
      <div style="font-size:15px;font-weight:900;font-family:monospace;color:var(--text);margin-bottom:12px">${r.away} @ ${r.home}</div>
      <div class="sp-grid">
        ${['away','home'].map(s=>{
          const nm=s==='away'?r.awayStarter:r.homeStarter,era=s==='away'?r.awayERA:r.homeERA,fip=s==='away'?r.awayFIP:r.homeFIP;
          const fi=s==='away'?r.awayFI:r.homeFI,l3=s==='away'?r.awayL3:r.homeL3,elo=s==='away'?r.awayElo:r.homeElo;
          const rdpg=s==='away'?r.awayRDpg:r.homeRDpg,live=s==='away'?r.awayLive:r.homeLive;
          const rest=s==='away'?r.awayRestDays:r.homeRestDays,bp=s==='away'?r.awayBPpct:r.homeBPpct;
          const fw=l3&&Math.abs(l3-era)>0.4;
          const fiColor=fi<=3.0?'var(--green)':fi>=4.5?'var(--red)':'var(--yellow)';
          const restColor=rest<=3?'var(--red)':rest>=7?'var(--green)':'var(--muted)';
          return`<div class="spbox ${live?'lv':''}">
            <div class="spbox-head"><span class="spbox-lbl">${s.toUpperCase()} SP</span><span class="spbox-tag" style="color:${live?'var(--green)':'var(--muted)'}">${live?'🟢':'📊'}</span></div>
            <div class="spbox-name">${nm}</div>
            <div class="spbox-stats">ERA ${era} · FIP ${fip} · <span style="color:${fiColor}">1i ${fi}</span></div>
            <div class="spbox-form" style="color:${fw?'var(--red)':'var(--yellow)'}">Elo ${elo} (${rdpg>0?'+':''}${rdpg.toFixed(1)} R/G)${l3?' · L3 '+l3+(fw?' ⚠':''):''}${bp>25?' · BP '+bp+'%':''}</div>
            <div class="spbox-adv"><span style="color:${restColor}">${rest}d rest</span></div>
          </div>`;
        }).join('')}
      </div>
      ${r.umpireKnown?`<div style="font-size:10px;color:var(--blue);font-family:monospace;margin-bottom:8px">🧑‍⚖️ ${r.umpire}: ${r.umpNote}</div>`:''}
      <div>${chip(r.parkType)}${chip(r.totalPick+' '+r.marketTotalLine,'b')}${r.dome?chip('DOME'):''}${r.hasOdds?chip('ODDS LIVE','g'):''}${r.movements?.length?chip('LINE MOVED','o'):''}${best&&!r.allLow?chip('BEST: '+best.toUpperCase(),'y'):''}</div>
    </div>
    <div class="card">
      <div class="clabel">WIN PROBABILITY — MARKET BASE + SITUATIONAL EDGES</div>
      <div class="wp-grid">
        <div><div class="wp-name">${r.away.split(' ').slice(-1)[0]}</div><div class="wp-pct" style="color:${r.mlWinner===r.away?'var(--green)':'#374151'}">${r.aWinP}%</div>${r.hasMarket?`<div style="font-size:9px;color:var(--dim);font-family:monospace">mkt: ${Math.round(r.mktAwayP*100)}%</div>`:''}</div>
        <div class="wp-vs">VS</div>
        <div style="text-align:right"><div class="wp-name" style="text-align:right">${r.home.split(' ').slice(-1)[0]}</div><div class="wp-pct" style="color:${r.mlWinner===r.home?'var(--green)':'#374151'}">${r.hWinP}%</div>${r.hasMarket?`<div style="font-size:9px;color:var(--dim);font-family:monospace;text-align:right">mkt: ${Math.round(r.mktHomeP*100)}%</div>`:''}</div>
      </div>
      <div class="wp-kelly">MODEL LINE: ${r.mlOdds} · Kelly: ${mlK}% bankroll</div>
    </div>
    <div class="bet-grid">
      ${bcard('MONEYLINE',r.mlWinner.split(' ').slice(-1)[0],r.mlConf,`${Math.max(r.hWinP,r.aWinP)}% win prob`,best==='ml'&&!r.allLow,mlK)}
      ${bcard('RUN LINE',r.rlPick,r.rlConf,`Proj margin: ${Math.abs(parseFloat(r.projDiff)).toFixed(1)} runs`,best==='rl'&&!r.allLow,0)}
      ${bcard(`TOTAL (${r.marketTotalLine})`,r.totalPick,r.totalConf,`Proj: ${r.expTotal} runs`,best==='total'&&!r.allLow,0)}
      ${bcard('NRFI/YRFI',r.nrfiPick,r.nrfiConf,`1i ERA: ${r.awayFI}/${r.homeFI}`,best==='nrfi'&&!r.allLow,0)}
    </div>
    ${r.f5Pick&&r.f5Conf>60?`<div class="fbox"><div class="fbox-title">F5 (FIRST 5 INNINGS) — PITCHER DRIVEN</div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">${bcard('F5 TOTAL',r.f5Pick,r.f5Conf,'SP stats only — no bullpen noise',r.f5Conf>=78,0)}${r.bestF5Price?bcard('F5 MONEYLINE',r.f5mlW?.split(' ').slice(-1)[0],r.f5mlC,'Pitcher-driven ML',r.f5mlC>=78,kellyOdds(r.mlProb,r.bestF5Price)):''}</div></div>`:''}
    ${projBreakdownHTML(r)}
    ${oddsHTML(r)}
    <div class="fbox"><div class="fbox-title">ALGORITHM FACTORS</div>${r.factors.map(f=>`<div class="frow2"><span class="fdot" style="color:var(--accent)">◆</span><span class="ftext">${f}</span></div>`).join('')}</div>`;
  const el=document.getElementById('gameResult');el.innerHTML=html;el.classList.remove('hidden');el.scrollIntoView({behavior:'smooth',block:'start'});
}

function runProp(){
  const pk=document.getElementById('playerSelect').value,pt=document.getElementById('propType').value,ln=parseFloat(document.getElementById('propLine').value)||null;
  if(!pk)return;
  const r=analyzeProp(pk,PLAYERS[pk]?.type==='pitcher'?'strikeouts':pt,ln);
  if(r)renderProp(r);
}

function renderProp(r){
  const pc=r.pick==='OVER'?'#22d3a5':r.pick==='UNDER'?'#f87171':'#6b7280',ec=r.edge==='Sharp'?'var(--green)':r.edge==='Moderate'?'var(--yellow)':'var(--muted)';
  const html=`<div class="prop-header" style="background:var(--bg2);border:1px solid ${pc}55"><div class="prop-top"><div><div class="prop-name">${r.player}</div><div class="prop-meta">${r.team} · ${r.prop}</div><div class="prop-line">Line: ${r.line}</div><div class="prop-note">${r.note}</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px"><div class="prop-badge" style="background:${pc}18;border:2px solid ${pc};color:${pc}">${r.pick}</div><span class="chip" style="border-color:${ec};color:${ec}">${r.edge}</span></div></div><div class="prop-conf-lbl">CONFIDENCE</div>${bar(r.conf)}<div class="prop-stat">${r.stat} · Kelly: ${r.kellyPct}% bankroll</div></div>${ppHTML(r)}<div class="fbox"><div class="fbox-title">ALGORITHM FACTORS</div>${r.factors.map(f=>`<div class="frow2"><span class="fdot" style="color:var(--blue2)">◆</span><span class="ftext">${f}</span></div>`).join('')}</div>`;
  const el=document.getElementById('propResult');el.innerHTML=html;el.classList.remove('hidden');el.scrollIntoView({behavior:'smooth',block:'start'});
}

const SC={live:'#22c55e',partial:'#fbbf24',offline:'#f87171',loading:'#60a5fa'};
function setStatus(t,txt,sub){const el=document.getElementById('statusText');el.textContent=txt;el.style.color=SC[t]||'#fff';document.getElementById('statusSub').textContent=sub;}
function setBanner(t,msg){const el=document.getElementById('apiBanner');el.className='banner '+t;el.innerHTML=(t==='loading'?'<span class="spin"></span>':'')+msg;}
function fmtDate(ds){if(!ds)return'';const[y,m,d]=ds.split('-').map(Number);return new Date(y,m-1,d).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});}
function populateGames(games,date){
  const sel=document.getElementById('gameSelect');
  document.getElementById('gameSelectLabel').textContent='SELECT GAME — '+(fmtDate(date)||'').toUpperCase();
  document.getElementById('dateLabel').textContent=(fmtDate(date)||'')+' · Run Diff · F5 · Live Lines · Umpire';
  sel.innerHTML='<option value="">— Pick a game —</option>';
  games.forEach((g,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`${g.time} — ${g.away} @ ${g.home}`;sel.appendChild(o);});
}
function populatePlayers(){renderPlayers();}
function setFilter(cat,btn){curFilter=cat;document.querySelectorAll('.fchip').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderPlayers();}
function renderPlayers(){
  const sel=document.getElementById('playerSelect');
  const f=Object.entries(PLAYERS).filter(([,v])=>{if(v.type==='pitcher')return curFilter==='all'||curFilter==='pitcher';return curFilter==='all'||(v.cats&&v.cats.includes(curFilter));});
  document.getElementById('playerCountLabel').textContent=`SELECT PLAYER (${f.length})`;
  sel.innerHTML='<option value="">— Select a player —</option>';
  f.filter(([,v])=>!v.type).forEach(([k,v])=>{const o=document.createElement('option');o.value=k;o.textContent=`${v.name} (${v.team})`;sel.appendChild(o);});
  const pits=f.filter(([,v])=>v.type==='pitcher');
  if(pits.length){const og=document.createElement('optgroup');og.label='── PITCHERS ──';pits.forEach(([k,v])=>{const o=document.createElement('option');o.value=k;o.textContent=`${v.name} (${v.team})`;og.appendChild(o);});sel.appendChild(og);}
  sel.value='';document.getElementById('btnProp').disabled=true;document.getElementById('btnProp').className='btn';document.getElementById('propResult').classList.add('hidden');
}
function onGameChange(){const sel=document.getElementById('gameSelect'),btn=document.getElementById('btnAnalyze');if(sel.value!==''){sel.className='rv';btn.disabled=false;btn.className='btn red';}else{sel.className='';btn.disabled=true;btn.className='btn';}document.getElementById('gameResult').classList.add('hidden');}
function onPlayerChange(){const pk=document.getElementById('playerSelect').value,btn=document.getElementById('btnProp');if(pk){document.getElementById('playerSelect').className='bv';btn.disabled=false;btn.className='btn blue';document.getElementById('propTypeWrap').style.display=PLAYERS[pk]?.type==='pitcher'?'none':'block';}else{document.getElementById('playerSelect').className='';btn.disabled=true;btn.className='btn';}document.getElementById('propResult').classList.add('hidden');}
function switchTab(tab){curTab=tab;document.getElementById('panelLines').classList.toggle('hidden',tab!=='lines');document.getElementById('panelProps').classList.toggle('hidden',tab!=='props');document.getElementById('tabLines').className='tab'+(tab==='lines'?' al':'');document.getElementById('tabProps').className='tab'+(tab==='props'?' ap':'');}
init();
</script>
</body>
</html>
