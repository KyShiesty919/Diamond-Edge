<!DOCTYPE html>
<html lang="en">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050b15;--bg2:#0a1020;--bg3:#060c18;
  --border:#111d30;--border2:#0d1a2e;
  --text:#dbeafe;--muted:#4a6080;--dim:#1e3a5f;--dim2:#2a4060;
  --green:#22d3a5;--yellow:#fbbf24;--red:#f87171;
  --blue:#3b82f6;--blue2:#2563eb;--accent:#dc2626;
}
body{background:var(--bg);color:var(--text);font-family:Georgia,serif;min-height:100vh;padding-bottom:80px}
.header{border-bottom:1px solid var(--border2);padding:16px 16px 0;background:var(--bg);position:sticky;top:0;z-index:10}
.header-inner{max-width:720px;margin:0 auto}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.logo-label{font-size:9px;color:#1d4ed8;letter-spacing:.35em;font-family:monospace;margin-bottom:3px}
.logo{font-size:22px;font-weight:900;color:var(--text);line-height:1}
.logo span{color:var(--blue)}
.logo-sub{font-size:9px;color:var(--dim);margin-top:3px;font-family:monospace}
.status-badge{text-align:right;font-family:monospace}
.status-text{font-size:9px}
.status-sub{font-size:8px;color:var(--dim);margin-top:2px}
.banner{border-radius:6px;padding:6px 12px;margin-bottom:10px;font-size:9px;font-family:monospace}
.banner.live{background:#081208;border:1px solid #22d3a533;color:var(--green)}
.banner.partial{background:#0c0a00;border:1px solid #fbbf2433;color:var(--yellow)}
.banner.offline{background:#0c0808;border:1px solid #7f1d1d;color:#fca5a5}
.banner.loading{background:var(--bg3);border:1px solid var(--border);color:#60a5fa}
.tabs{display:flex}
.tab{flex:1;padding:10px 12px;background:none;border:none;border-bottom:2px solid var(--border2);cursor:pointer;text-align:left}
.tab.al{border-bottom-color:var(--accent)}
.tab.ap{border-bottom-color:var(--blue2)}
.tab-label{font-size:11px;font-weight:800;letter-spacing:.12em;font-family:monospace;color:var(--dim)}
.tab.al .tab-label,.tab.ap .tab-label{color:var(--text)}
.tab-sub{font-size:9px;color:var(--border2);margin-top:2px}

.content{max-width:720px;margin:0 auto;padding:14px 16px 0}
.disc{font-size:9px;color:var(--dim);background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:7px 12px;margin-bottom:12px;font-family:monospace}

.clabel{font-size:9px;color:var(--dim2);letter-spacing:.18em;font-family:monospace;margin-bottom:5px}
select,input{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-family:monospace;outline:none;cursor:pointer;margin-bottom:10px;-webkit-appearance:none;appearance:none}
select.rv{border-color:var(--accent)}select.bv{border-color:var(--blue2)}
input{cursor:text}input::placeholder{color:var(--dim)}

.edge-desc{font-size:11px;color:var(--muted);line-height:1.5}
.sp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.spbox{background:var(--bg3);border-radius:6px;padding:8px 10px;border:1px solid var(--border)}

.spbox-head{display:flex;justify-content:space-between;margin-bottom:2px}
.spbox-lbl{font-size:8px;color:var(--dim);letter-spacing:.15em;font-family:monospace}
.spbox-tag{font-size:8px;font-family:monospace}
.spbox-name{font-size:12px;font-weight:700;color:var(--text)}
.spbox-stats{font-size:9px;color:var(--muted);margin-top:2px}

.wp-grid{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.wp-name{font-size:11px;color:#64748b;margin-bottom:3px}
.wp-pct{font-size:28px;font-weight:900;font-family:monospace}
.wp-vs{font-size:11px;color:var(--dim2);font-family:monospace}
.wp-kelly{font-size:10px;color:var(--yellow);margin-top:8px;font-family:monospace}
.fbox{background:var(--bg3);border-radius:8px;padding:12px 14px;border:1px solid var(--border);margin-bottom:12px}
.fbox-title{font-size:9px;color:var(--dim);letter-spacing:.18em;font-family:monospace;margin-bottom:8px}
.frow2{display:flex;gap:8px;margin-bottom:6px;align-items:flex-start}
.fdot{font-size:10px;margin-top:2px;flex-shrink:0}
.ftext{font-size:11px;color:var(--muted);line-height:1.5}
.prop-header{border-radius:12px;padding:14px;margin-bottom:12px}
.prop-top{display:flex;justify-content:space-between;align-items:flex-start}

.prop-note{font-size:10px;color:#374151;margin-top:3px}
.prop-badge{padding:7px 14px;border-radius:6px;font-size:20px;font-weight:900;font-family:monospace}
.prop-conf-lbl{font-size:9px;letter-spacing:.15em;font-family:monospace;margin-bottom:6px;color:var(--dim2);margin-top:12px}
.prop-stat{font-size:10px;color:var(--yellow);margin-top:8px;font-family:monospace}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}

<script>
const ODDS_KEY='c655eb40c9d723f864346623ba723695';
const BOOKS=['fanduel','draftkings','betmgm','caesars','bet365','fanatics'];
const BNAMES={fanduel:'FanDuel',draftkings:'DraftKings',betmgm:'BetMGM',caesars:'Caesars',bet365:'Bet365',fanatics:'Fanatics'};

function todayET(){return new Date().toLocaleDateString('en-CA',{timeZone:'America/New_York'});}
async function mlb(path){const r=await fetch('https://statsapi.mlb.com'+path,{signal:AbortSignal.timeout(10000)});if(!r.ok)throw new Error('MLB '+r.status);return r.json();}
async function oddsApi(path){const r=await fetch('https://api.the-odds-api.com'+path,{signal:AbortSignal.timeout(10000)});if(!r.ok)throw new Error('Odds '+r.status);return r.json();}

async function fetchSchedule(){
  const date=todayET();
  const data=await mlb(`/api/v1/schedule?sportId=1&date=${date}&hydrate=probablePitcher,team,weather`);
  const games=[];
  for(const d of(data.dates||[])){
    for(const g of(d.games||[])){
      const st=g.status?.abstractGameState;
      if(st!=='Preview'&&st!=='Pre-Game'&&st!=='Scheduled')continue;
      games.push({
        away:g.teams?.away?.team?.name||'',home:g.teams?.home?.team?.name||'',
        awayPId:g.teams?.away?.probablePitcher?.id||null,homePId:g.teams?.home?.probablePitcher?.id||null,
        awayPName:g.teams?.away?.probablePitcher?.fullName||null,homePName:g.teams?.home?.probablePitcher?.fullName||null,
        awayTId:g.teams?.away?.team?.id||null,homeTId:g.teams?.home?.team?.id||null,
        weather:g.weather||null,
        time:g.gameDate?new Date(g.gameDate).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'}):'TBD',
      });
    }
  }
  return{games,date};
}

async function fetchPitcherStats(id){
  if(!id)return null;
  try{
    const data=await mlb(`/api/v1/people/${id}/stats?stats=season,gameLog&group=pitching&season=2026&limit=5`);
    const season=data.stats?.find(s=>s.type?.displayName==='season')?.splits?.[0]?.stat;
    const logs=data.stats?.find(s=>s.type?.displayName==='gameLog')?.splits||[];
    let fi_er=0,fi_g=0;
    for(const l of logs.slice(0,5)){const ip=parseFloat(l.stat?.inningsPitched)||0;if(ip>0){fi_er+=parseFloat(l.stat?.earnedRuns)||0;fi_g++;}}
    const fi_era=fi_g>0?parseFloat(((fi_er/fi_g)*9).toFixed(2)):null;
    if(!season)return null;
    const era=parseFloat(season.era)||null,whip=parseFloat(season.whip)||null;
    const k9=parseFloat(season.strikeoutsPer9Inn)||null,bb9=parseFloat(season.walksPer9Inn)||null;
    const fip=era&&bb9&&k9?parseFloat((era+(bb9-k9)*0.15).toFixed(2)):null;
    return{era,whip,k9,bb9,fip,fi_era,wins:season.wins||0,losses:season.losses||0};
  }catch{return null;}
}

async function fetchTeamStats(id){
  if(!id)return null;
  try{
    const[hit,pit]=await Promise.all([
      mlb(`/api/v1/teams/${id}/stats?stats=season&group=hitting&season=2026`),
      mlb(`/api/v1/teams/${id}/stats?stats=season&group=pitching&season=2026`),
    ]);
    const hs=hit.stats?.[0]?.splits?.[0]?.stat,ps=pit.stats?.[0]?.splits?.[0]?.stat;
    return{avg:parseFloat(hs?.avg)||null,ops:parseFloat(hs?.ops)||null,rpg:parseFloat(hs?.runsPerGame)||null,bERA:parseFloat(ps?.era)||null};
  }catch{return null;}
}

async function fetchBullpenFatigue(teamId){
  if(!teamId)return 0;
  try{
    const roster=await mlb(`/api/v1/teams/${teamId}/roster?rosterType=active`);
    const rp=(roster.roster||[]).filter(p=>p.position?.abbreviation==='RP').slice(0,6);
    let totalIP=0;
    await Promise.all(rp.map(async p=>{
      try{const d=await mlb(`/api/v1/people/${p.person.id}/stats?stats=gameLog&group=pitching&season=2026&limit=3`);
        for(const l of(d.stats?.[0]?.splits||[]))totalIP+=parseFloat(l.stat?.inningsPitched)||0;
      }catch{}
    }));
    return Math.min(1,totalIP/12);
  }catch{return 0;}
}

async function fetchLineupQ(id){
  if(!id)return 1.0;
  try{
    const data=await mlb(`/api/v1/teams/${id}/stats?stats=season&group=hitting&season=2026`);
    const ops=parseFloat(data.stats?.[0]?.splits?.[0]?.stat?.ops)||0.720;
    return Math.min(1.15,Math.max(0.85,ops/0.730));
  }catch{return 1.0;}
}

async function fetchStandings(){
  try{
    const data=await mlb('/api/v1/standings?leagueId=103,104&season=2026&standingsTypes=regularSeason');
    const map={};
    for(const rec of(data.records||[])){
      for(const t of(rec.teamRecords||[])){
        const rd=t.runDifferential||0;
        map[t.team.id]={
          wPct:parseFloat(t.winningPercentage||'.500'),
          wins:t.wins||0,losses:t.losses||0,
          streak:t.streak?.streakNumber||0,streakType:t.streak?.streakType||'W',
          runDiff:rd,
          elo:Math.round(1500+(parseFloat(t.winningPercentage||'.500')-0.5)*400+rd*0.8),
        };
      }
    }
    return map;
  }catch{return{};}
}

let oddsCache=null;
async function fetchOdds(){
  if(oddsCache)return oddsCache;
  try{
    const data=await oddsApi(`/v4/sports/baseball_mlb/odds?apiKey=${ODDS_KEY}&regions=us&markets=h2h,spreads,totals&oddsFormat=american&bookmakers=${BOOKS.join(',')}`);
    oddsCache=data;return data;
  }catch(e){console.warn('Odds API:',e);return[];}
}

function findOdds(odds,away,home){
  if(!odds?.length)return null;
  const n=s=>s.toLowerCase().replace(/\s+/g,'').replace('athletics','as');
  const aN=n(away),hN=n(home);
  return odds.find(g=>{
    const ta=n(g.away_team||''),th=n(g.home_team||'');
    return(ta.includes(aN.slice(0,6))||aN.includes(ta.slice(0,6)))&&(th.includes(hN.slice(0,6))||hN.includes(th.slice(0,6)));
  })||null;
}

function parseOdds(go,away,home){
  if(!go)return{ml:{},rl:{},total:{}};
  const ml={},rl={},total={};
  for(const bm of(go.bookmakers||[])){
    const k=bm.key;
    for(const mkt of(bm.markets||[])){
      if(mkt.key==='h2h'){
        for(const o of(mkt.outcomes||[])){
          if(!ml[k])ml[k]={};
          if(o.name===home||o.name.toLowerCase().includes(home.split(' ').slice(-1)[0].toLowerCase()))ml[k].home=o.price;
          else ml[k].away=o.price;
        }
      }
      if(mkt.key==='spreads'){
        for(const o of(mkt.outcomes||[])){
          if(o.name===home||o.name.toLowerCase().includes(home.split(' ').slice(-1)[0].toLowerCase()))rl[k]={price:o.price,point:o.point};
          else rl[k+'_a']={price:o.price,point:o.point};
        }
      }
      if(mkt.key==='totals'){
        for(const o of(mkt.outcomes||[])){
          if(!total[k])total[k]={};
          total[k][o.name.toLowerCase()]={price:o.price,point:o.point};
        }
      }
    }
  }
  return{ml,rl,total};
}

function a2p(odds){if(!odds)return null;return odds>0?100/(odds+100):Math.abs(odds)/(Math.abs(odds)+100);}
function edgeCalc(mp,mo){const ip=a2p(mo);if(!ip)return null;return((mp-ip)*100).toFixed(1);}
function kellyOdds(prob,amo){if(!amo)return 0;const dec=amo>0?(amo/100)+1:(100/Math.abs(amo))+1;const b=dec-1,k=(b*prob-(1-prob))/b;return Math.round(Math.max(0,Math.min(0.20,k))*1000)/10;}

  "Arizona Diamondbacks":{bera:3.7,nrfiRate:.612,o85:.468,rlCH:.501,rlCA:.455,avgRA:4.1,h2h:{"Chicago Cubs":-0.02}},

let appGames=[],appStandings={},appOdds=[],curFilter='all',curTab='lines';

async function init(){
  setStatus('loading','⟳ LOADING','CONNECTING...');
  setBanner('loading','⏳ Connecting to MLB Stats API + The Odds API...');
  let schedGames=[],schedDate='';
  try{
    const{games,date}=await fetchSchedule();
    schedGames=games;schedDate=date;
    setStatus('partial','◑ LIVE SCHEDULE','ENRICHING...');
    setBanner('partial','✓ Schedule loaded — fetching pitcher stats, Elo, bullpen fatigue & live odds...');
    populateGames(schedGames,schedDate);
  }catch(e){
    console.warn('Schedule:',e);
    const fb=getFallback();schedGames=fb.games;schedDate=fb.date;
    setStatus('offline','⚠ OFFLINE','FALLBACK DATA');
    setBanner('offline','⚠ MLB API unreachable — using fallback slate');
    appGames=schedGames.map(g=>({...g}));
    populateGames(appGames,schedDate);
    populatePlayers();return;
  }
  const[standings,odds,...enriched]=await Promise.all([
    fetchStandings(),fetchOdds(),...schedGames.map(enrichGame),
  ]);
  appStandings=standings;appOdds=odds;appGames=enriched;
  const hasLive=enriched.some(g=>g.awayLiveSP||g.homeLiveSP||g.awayTS);
  const hasOdds=odds&&odds.length>0;
  setStatus(hasLive?'live':'partial',hasLive?'● LIVE DATA':'◑ PARTIAL',hasOdds?'MLB + ODDS API':'MLB API');
  setBanner(hasLive?'live':'partial',
    `✅ ${hasLive?'Live MLB data active':'Schedule loaded'}${hasOdds?' · '+odds.length+' games with live odds from FanDuel, Caesars, DraftKings & more':''}`);
  populateGames(appGames,schedDate);
  populatePlayers();
}

async function enrichGame(g){
  try{
    const[aS,hS,aT,hT,aBP,hBP,aLQ,hLQ]=await Promise.all([
      fetchPitcherStats(g.awayPId),fetchPitcherStats(g.homePId),
      fetchTeamStats(g.awayTId),fetchTeamStats(g.homeTId),
      fetchBullpenFatigue(g.awayTId),fetchBullpenFatigue(g.homeTId),
      fetchLineupQ(g.awayTId),fetchLineupQ(g.homeTId),
    ]);
    return{...g,awayLiveSP:aS,homeLiveSP:hS,awayTS:aT,homeTS:hT,
      awayBP:aBP||0,homeBP:hBP||0,awayLQ:aLQ||1.0,homeLQ:hLQ||1.0,
      awayLiveName:g.awayPName,homeLiveName:g.homePName};
  }catch{return{...g,awayBP:0,homeBP:0,awayLQ:1.0,homeLQ:1.0};}
}

  ]};
  if(F[today])return{games:F[today],date:today};

  for(const d of dates)if(d>=today)return{games:F[d],date:d};
  return{games:F[dates[dates.length-1]]||[],date:dates[dates.length-1]};
}

function cc(v){return v>=72?'#22d3a5':v>=62?'#fbbf24':'#f87171';}
function cl(v){return v>=72?'HIGH':v>=62?'MED':'LOW';}
function p2c(p){return Math.round(Math.min(88,Math.max(55,55+(p-0.5)*110)));}
function toA(p){return p>=0.5?`-${Math.round((p/(1-p))*100)}`:`+${Math.round(((1-p)/p)*100)}`;}

function mSP(base,ln,live){
  if(!live)return base;
  const era=live.era??base.era,whip=live.whip??base.whip,k9=live.k9??base.k9,bb9=live.bb9??base.bb9;
  const fip=era&&bb9&&k9?parseFloat((era+(bb9-k9)*0.15).toFixed(2)):base.fip;
  const fi_era=live.fi_era??base.fi_era;
  const nrfi=fi_era?Math.min(0.78,Math.max(0.42,base.nrfi+(base.fi_era-fi_era)*0.018)):base.nrfi;
  return{...base,name:ln||base.name,era,whip,k9,bb9,fip,fi_era,nrfi,live:true};
}

function analyzeGame(g){
  const{away,home,awayLiveSP,homeLiveSP,awayTS,homeTS,awayBP=0,homeBP=0,awayLQ=1.0,homeLQ=1.0,awayLiveName,homeLiveName,awayTId,homeTId,weather}=g;
  const A=TB[away]||DT,H=TB[home]||DT;
  const AS=mSP(SPB[away]||DSP,awayLiveName,awayLiveSP);
  const HS=mSP(SPB[home]||DSP,homeLiveName,homeLiveSP);
  const park=PARKS[home]||{f:1.0,type:'Neutral'};
  const dome=DOMES.includes(home);
  const aRPG=(awayTS?.rpg??4.3)*awayLQ,hRPG=(homeTS?.rpg??4.3)*homeLQ;
  const aOPS=awayTS?.ops??0.720,hOPS=homeTS?.ops??0.720;
  const aBERA=awayTS?.bERA??A.bera,hBERA=homeTS?.bERA??H.bera;
  const aSt=appStandings[awayTId],hSt=appStandings[homeTId];
  const aElo=aSt?.elo??1500,hElo=hSt?.elo??1500;
  const aWP=aSt?.wPct??0.500,hWP=hSt?.wPct??0.500;
  const aStr=aSt?(aSt.streakType==='W'?aSt.streak:-aSt.streak):0;
  const hStr=hSt?(hSt.streakType==='W'?hSt.streak:-hSt.streak):0;
  const eloDiff=(hElo+35)-aElo;
  const eloH=1/(1+Math.pow(10,-eloDiff/400)),eloA=1-eloH;
  const aFQ=(5.0-AS.fip)/5.0,hFQ=(5.0-HS.fip)/5.0;
  const aC=Math.max(0,1-(AS.bb9-2.0)*0.04),hC=Math.max(0,1-(HS.bb9-2.0)*0.04);
  const aBP2=(1-aBERA/6)*(1-awayBP*0.15),hBP2=(1-hBERA/6)*(1-homeBP*0.15);
  const h2h=H.h2h?.[away]||0;
  const aScore=eloA*0.30+aWP*0.15+aFQ*0.18+aC*0.05+aBP2*0.12+(aRPG/5.5)*0.10+(aOPS/0.82)*0.06+Math.min(1,(aStr+6)/12)*0.04;
  const hScore=eloH*0.30+hWP*0.15+hFQ*0.18+hC*0.05+hBP2*0.12+(hRPG/5.5)*0.10+(hOPS/0.82)*0.06+Math.min(1,(hStr+6)/12)*0.04+(h2h>0?h2h*0.3:0);
  const tot=aScore+hScore;
  const hWin=Math.min(0.80,Math.max(0.20,hScore/tot)),aWin=1-hWin;
  const mlW=hWin>=aWin?home:away,mlP=Math.max(hWin,aWin),mlC=p2c(mlP);
  const favH=mlW===home,favT=favH?H:A,favSP=favH?HS:AS,favBP=favH?homeBP:awayBP;
  const dogRA=favH?A.avgRA:H.avgRA,favRPG=favH?hRPG:aRPG;
  const rlRaw=(favH?favT.rlCH:favT.rlCA)+favSP.ace*0.022+(favRPG-dogRA)*0.015+((favH?hStr:aStr)>3?0.018:(favH?hStr:aStr)<-2?-0.015:0)-favBP*0.04+Math.abs(h2h)*0.20*(favH?1:-1);
  const rlP=Math.min(0.76,Math.max(0.40,rlRaw)),rlC=p2c(rlP);
  const favS=mlW.split(' ').slice(-1)[0],dogS=(favH?away:home).split(' ').slice(-1)[0];
  const rlPick=rlP>=0.54?`${favS} -1.5`:`${dogS} +1.5`;
  let wxR=0,wxN=0;
  if(!dome&&weather){
    const t=parseFloat(weather.temp)||68,w=parseFloat(weather.wind)||5,c=(weather.condition||'').toLowerCase();
    if(c.includes('out')){wxR+=Math.min(0.3,w*0.02);wxN-=0.015;}
    if(c.includes('in')){wxR-=Math.min(0.25,w*0.018);wxN+=0.02;}
    if(t<50){wxR-=0.15;wxN+=0.025;}if(t>75)wxR+=0.10;
    if(parseFloat(weather.precipitation)>25)wxR-=0.08;
  }
  const expA=(aRPG*0.50+HS.era/9*3.1)*park.f+wxR*0.5;
  const expH=(hRPG*0.50+AS.era/9*3.1)*park.f+wxR*0.5;
  const fAdj=((AS.fip-AS.era)+(HS.fip-HS.era))*0.10;
  const expT=expA+expH+fAdj,line=8.5;
  const oP=Math.min(0.77,Math.max(0.23,0.5+((expT-line)/line)*1.5+((A.o85+H.o85)/2-0.5)*0.6));
  const tC=p2c(Math.max(oP,1-oP));
  const fiAvg=(AS.fi_era+HS.fi_era)/2,fiQ=(5.0-fiAvg)/5.0;
  const nrfiRaw=fiQ*0.35+(AS.nrfi+HS.nrfi)/2*0.30+(A.nrfiRate+H.nrfiRate)/2*0.20+(park.f>1.05?-0.045:park.f<0.96?0.045:0)*0.10+wxN+0.05;
  const nrfiP=Math.min(0.79,Math.max(0.36,nrfiRaw)),nrfiC=p2c(Math.max(nrfiP,1-nrfiP));
  const nrfiPick=nrfiP>=0.55?'NRFI':nrfiP<=0.45?'YRFI':'PASS';
  const sc={ml:mlC,rl:rlC,total:tC,nrfi:nrfiC};
  const best=Object.entries(sc).sort((a,b)=>b[1]-a[1])[0][0];
  const go=findOdds(appOdds,away,home);
  const po=parseOdds(go,away,home);
  const fx=[];
  fx.push(`${AS.live?'🟢':'📊'} ${AS.name}: ${AS.era} ERA / ${AS.fip} FIP / ${AS.fi_era} 1st-inn ERA`);
  fx.push(`${HS.live?'🟢':'📊'} ${HS.name}: ${HS.era} ERA / ${HS.fip} FIP / ${HS.fi_era} 1st-inn ERA`);
  if(aSt)fx.push(`📊 Elo: ${away.split(' ').slice(-1)[0]} ${aElo} vs ${home.split(' ').slice(-1)[0]} ${hElo} → ${Math.round(aWin*100)}%/${Math.round(hWin*100)}%`);
  if(awayBP>0.3)fx.push(`⚠ ${away} bullpen fatigue: ${Math.round(awayBP*100)}% — reduces RL cover rate`);
  if(homeBP>0.3)fx.push(`⚠ ${home} bullpen fatigue: ${Math.round(homeBP*100)}% — reduces RL cover rate`);
  if(Math.abs(h2h)>=0.05)fx.push(`H2H edge: ${h2h>0?home:away} dominates this series`);
  if(!dome&&weather?.temp)fx.push(`Weather: ${weather.temp}°F ${weather.condition||''}`);
  fx.push(`Proj total: ${expT.toFixed(1)} runs (park×${park.f}, lineup adj applied)`);
  return{away,home,awayStarter:AS.name,homeStarter:HS.name,
    awayERA:AS.era,homeERA:HS.era,awayFIP:AS.fip,homeFIP:HS.fip,awayFI:AS.fi_era,homeFI:HS.fi_era,
    awayElo:aElo,homeElo:hElo,awayLive:AS.live||false,homeLive:HS.live||false,
    awayBPpct:Math.round(awayBP*100),homeBPpct:Math.round(homeBP*100),
    parkType:park.type,expTotal:expT.toFixed(1),dome,
    mlWinner:mlW,mlProb:mlP,mlConf:mlC,mlOdds:toA(mlP),
    hWinP:Math.round(hWin*100),aWinP:Math.round(aWin*100),
    rlPick,rlProb:rlP,rlConf:rlC,
    totalLine:line,totalPick:oP>=0.5?'OVER':'UNDER',totalConf:tC,overProb:oP,
    nrfiPick,nrfiProb:nrfiP,nrfiConf:nrfiC,
    bestBet:best,factors:fx.slice(0,5),parsedOdds:po,hasOdds:!!go};
}

function analyzeProp(key,type,cLine){
  const p=PLAYERS[key];if(!p)return null;
  if(p.type==='pitcher'){
    const kpg=p.kpg9/9*6,line=cLine??parseFloat((kpg-.5).toFixed(1));
    const oP=Math.min(.82,Math.max(.18,.5+(kpg-line)*.14)),c=p2c(Math.max(oP,1-oP));
    return{player:p.name,team:p.team,prop:'Strikeouts',line,pick:oP>=.5?'OVER':'UNDER',conf:c,
      edge:c>=72?'Sharp':c>=62?'Moderate':'Lean',kellyPct:kellyOdds(Math.max(oP,1-oP),oP>=.5?-130:110),
      stat:`${p.kpg9} K/9 → ~${kpg.toFixed(1)} proj`,note:`${p.era} ERA · ${p.fip} FIP · ${p.whip} WHIP`,
      factors:[`Projects ${kpg.toFixed(1)} Ks at ${p.kpg9} K/9 over ~6 IP`,`FIP ${p.fip} — true talent indicator`,kpg>line?`Line ${line} below projection — OVER value`:`Line ${line} above projection — UNDER value`]};
  }
  const m={hits:{b:p.hitpg,d:1.5},rbis:{b:p.rbipg,d:.5},hr:{b:p.hrpg*10,d:.5},runs:{b:p.runspg,d:.5}};
  const pd=m[type]||m.hits,line=cLine??pd.d;
  const oP=Math.min(.83,Math.max(.17,.5+(pd.b-line)*(type==='hr'?.32:.30)+(p.trend||0)*.04)),c=p2c(Math.max(oP,1-oP));
  const lb={hits:'Hits',rbis:'RBIs',hr:'Home Runs',runs:'Runs'}[type]||'Hits';
  return{player:p.name,team:p.team,prop:lb,line,pick:oP>=.5?'OVER':'UNDER',conf:c,
    edge:c>=72?'Sharp':c>=62?'Moderate':'Lean',kellyPct:kellyOdds(Math.max(oP,1-oP),oP>=.5?-130:110),
    stat:`${pd.b.toFixed(2)} ${lb}/G`,note:`.${Math.round(p.avg*1000)} AVG · .${Math.round(p.obp*1000)} OBP · .${Math.round(p.slg*1000)} SLG`,
    factors:[`Season avg ${pd.b.toFixed(2)} ${lb.toLowerCase()}/game vs line of ${line}`,
      `Splits: vR .${Math.round(p.vsR*1000)} · vL .${Math.round(p.vsL*1000)} · Home .${Math.round(p.home*1000)} · Away .${Math.round(p.away*1000)}`,
      p.trend===1?'Hot streak — trending up':p.trend===-1?'Cold — trending down':'Neutral form']};
}

function bar(v){const c=cc(v);return`<div class="bar-wrap"><div class="bar-track"><div class="bar-fill" style="width:${v}%;background:${c}"></div></div><span class="bar-label" style="color:${c}">${v}%</span></div>`;}
function chip(t,cls=''){return`<span class="chip ${cls}">${t}</span>`;}

function bcard(title,pick,conf,sub,hl,kp){
  const c=cc(conf||55);
  return`<div class="bcard" style="background:${hl?c+'15':'var(--bg3)'};border:1.5px solid ${hl?c:'var(--border)'}">
    <div class="bcard-head"><span class="bcard-title" style="color:${hl?c:'var(--dim2)'}">${title}${hl?' ★':''}</span><span class="chip" style="border-color:${c};color:${c}">${cl(conf)}</span></div>
    <div class="bcard-pick" style="color:${pick==='PASS'?'var(--dim)':'var(--text)'}">${pick||'—'}</div>
    ${bar(conf||55)}
    ${sub?`<div class="bcard-sub">${sub}</div>`:''}
    ${kp>0?`<div class="bcard-kelly">Kelly: ${kp}% bankroll</div>`:''}
  </div>`;
}

function oddsHTML(r){
  const{parsedOdds:po,away,home,mlWinner,mlProb,overProb,totalLine,hasOdds}=r;
  if(!hasOdds)return`<div class="fbox"><div class="fbox-title">LIVE ODDS</div><div style="font-size:11px;color:var(--dim)">No odds data found — check API quota or try later</div></div>`;
  const{ml,rl,total}=po;
  const mlP=mlWinner===home?mlProb:1-mlProb;
  const mlFav=mlWinner===home?'home':'away';
  let mlRows='',bestML=null,bestBook='';
  for(const b of BOOKS){
    const v=ml[b];if(!v)continue;
    const price=mlFav==='home'?v.home:v.away;if(price==null)continue;
    const e=edgeCalc(mlP,price),en=parseFloat(e||0);
    const isBest=bestML===null||price>bestML;
    if(isBest){bestML=price;bestBook=b;}
    const k=kellyOdds(mlP,price);
    mlRows+=`<tr class="${isBest?'best-row':''}"><td>${BNAMES[b]||b}</td><td>${price>0?'+':''}${price}</td><td class="${en>3?'edge-pos':en<-2?'edge-neg':''}">${en>0?'+':''}${e}%</td><td>${k>0?k+'%':'—'}</td></tr>`;
  }
  const totSide=overProb>=0.5?'over':'under';
  let totRows='';
  for(const b of BOOKS){
    const v=total[b]?.[totSide];if(!v)continue;
    const e=edgeCalc(Math.max(overProb,1-overProb),v.price),en=parseFloat(e||0);
    totRows+=`<tr><td>${BNAMES[b]||b}</td><td>${totSide.toUpperCase()} ${v.point}</td><td>${v.price>0?'+':''}${v.price}</td><td class="${en>3?'edge-pos':en<-2?'edge-neg':''}">${en>0?'+':''}${e}%</td></tr>`;
  }
  let sharpHTML='';
  if(bestML!==null){
    const be=parseFloat(edgeCalc(mlP,bestML)||0);
    if(be>4)sharpHTML=`<div class="edge-banner sharp"><div class="edge-title">⚡ SHARP EDGE DETECTED</div><div class="edge-desc">${mlWinner} ML on ${BNAMES[bestBook]} has ${be.toFixed(1)}% edge vs implied probability</div></div>`;
  }
  return`
    <div class="fbox"><div class="fbox-title">LIVE ODDS — MONEYLINE (${mlWinner.split(' ').slice(-1)[0]})</div>
      <table class="odds-table"><thead><tr><th>BOOK</th><th>ODDS</th><th>EDGE</th><th>KELLY</th></tr></thead>
      <tbody>${mlRows||'<tr><td colspan="4" style="color:var(--dim)">No ML odds</td></tr>'}</tbody></table>
    </div>
    <div class="fbox"><div class="fbox-title">LIVE ODDS — TOTAL (${totSide.toUpperCase()} ${totalLine})</div>
      <table class="odds-table"><thead><tr><th>BOOK</th><th>LINE</th><th>ODDS</th><th>EDGE</th></tr></thead>
      <tbody>${totRows||'<tr><td colspan="4" style="color:var(--dim)">No total odds</td></tr>'}</tbody></table>
    </div>
    ${sharpHTML}`;
}

function populateGames(games,date){
  const sel=document.getElementById('gameSelect');
  document.getElementById('gameSelectLabel').textContent='SELECT GAME — '+(fmtDate(date)||'').toUpperCase();
  document.getElementById('dateLabel').textContent=(fmtDate(date)||'')+' · Elo · FIP · 1st-Inn ERA · Live Odds';
  sel.innerHTML='<option value="">— Pick a game —</option>';
  games.forEach((g,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`${g.time} — ${g.away} @ ${g.home}`;sel.appendChild(o);});
}
function populatePlayers(){renderPlayers();}
function setFilter(cat,btn){curFilter=cat;document.querySelectorAll('.fchip').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderPlayers();}
function renderPlayers(){
  const sel=document.getElementById('playerSelect');
  const f=Object.entries(PLAYERS).filter(([,v])=>{
    if(v.type==='pitcher')return curFilter==='all'||curFilter==='pitcher';
    return curFilter==='all'||(v.cats&&v.cats.includes(curFilter));
  });
  document.getElementById('playerCountLabel').textContent=`SELECT PLAYER (${f.length})`;
  sel.innerHTML='<option value="">— Select a player —</option>';
  f.filter(([,v])=>!v.type).forEach(([k,v])=>{const o=document.createElement('option');o.value=k;o.textContent=`${v.name} (${v.team})`;sel.appendChild(o);});
  const pits=f.filter(([,v])=>v.type==='pitcher');
  if(pits.length){const og=document.createElement('optgroup');og.label='── PITCHERS ──';pits.forEach(([k,v])=>{const o=document.createElement('option');o.value=k;o.textContent=`${v.name} (${v.team})`;og.appendChild(o);});sel.appendChild(og);}
  sel.value='';document.getElementById('btnProp').disabled=true;document.getElementById('btnProp').className='btn';document.getElementById('propResult').classList.add('hidden');
}
function onGameChange(){
  const sel=document.getElementById('gameSelect'),btn=document.getElementById('btnAnalyze');
  if(sel.value!==''){sel.className='rv';btn.disabled=false;btn.className='btn red';}
  else{sel.className='';btn.disabled=true;btn.className='btn';}
  document.getElementById('gameResult').classList.add('hidden');
}
function onPlayerChange(){
  const pk=document.getElementById('playerSelect').value,btn=document.getElementById('btnProp');
  if(pk){document.getElementById('playerSelect').className='bv';btn.disabled=false;btn.className='btn blue';document.getElementById('propTypeWrap').style.display=PLAYERS[pk]?.type==='pitcher'?'none':'block';}
  else{document.getElementById('playerSelect').className='';btn.disabled=true;btn.className='btn';}
  document.getElementById('propResult').classList.add('hidden');
}
function switchTab(tab){
  curTab=tab;
  document.getElementById('panelLines').classList.toggle('hidden',tab!=='lines');
  document.getElementById('panelProps').classList.toggle('hidden',tab!=='props');
  document.getElementById('tabLines').className='tab'+(tab==='lines'?' al':'');
  document.getElementById('tabProps').className='tab'+(tab==='props'?' ap':'');
}
init();
</script>
</body>
