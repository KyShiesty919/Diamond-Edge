<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DiamondEdge — MLB Betting Algorithm</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #050b15;
    --bg2:      #0a1020;
    --bg3:      #060c18;
    --border:   #111d30;
    --border2:  #0d1a2e;
    --text:     #dbeafe;
    --muted:    #4a6080;
    --dim:      #1e3a5f;
    --dim2:     #2a4060;
    --green:    #22d3a5;
    --yellow:   #fbbf24;
    --red:      #f87171;
    --blue:     #3b82f6;
    --blue2:    #2563eb;
    --accent:   #dc2626;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* ── HEADER ── */
  .header {
    border-bottom: 1px solid var(--border2);
    padding: 18px 18px 0;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .logo-label {
    font-size: 9px;
    color: #1d4ed8;
    letter-spacing: 0.35em;
    font-family: monospace;
    margin-bottom: 3px;
  }
  .logo {
    font-size: 24px;
    font-weight: 900;
    color: var(--text);
    line-height: 1;
  }
  .logo span { color: var(--blue); }
  .logo-sub {
    font-size: 9px;
    color: var(--dim);
    margin-top: 3px;
    font-family: monospace;
  }
  .status-badge {
    text-align: right;
    font-family: monospace;
  }
  .status-text { font-size: 9px; }
  .status-sub  { font-size: 8px; color: var(--dim); margin-top: 2px; }

  /* ── API BANNER ── */
  .api-banner {
    border-radius: 6px;
    padding: 6px 12px;
    margin-bottom: 10px;
    font-size: 9px;
    font-family: monospace;
  }
  .api-banner.live    { background:#081208; border:1px solid #22d3a533; color:var(--green); }
  .api-banner.partial { background:#0c0a00; border:1px solid #fbbf2433; color:var(--yellow); }
  .api-banner.offline { background:#0c0808; border:1px solid #7f1d1d;   color:#fca5a5; }
  .api-banner.loading { background:var(--bg3); border:1px solid var(--border); color:#60a5fa; }

  /* ── TABS ── */
  .tabs { display: flex; }
  .tab {
    flex: 1;
    padding: 11px 12px;
    background: none;
    border: none;
    border-bottom: 2px solid var(--border2);
    cursor: pointer;
    text-align: left;
    transition: border-color 0.2s;
  }
  .tab.active-lines  { border-bottom-color: var(--accent); }
  .tab.active-props  { border-bottom-color: var(--blue2); }
  .tab-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.12em;
    font-family: monospace;
    color: var(--dim);
  }
  .tab.active-lines .tab-label,
  .tab.active-props .tab-label { color: var(--text); }
  .tab-sub { font-size: 9px; color: var(--border2); margin-top: 2px; }
  .tab.active-lines .tab-sub,
  .tab.active-props .tab-sub  { color: var(--dim2); }

  /* ── CONTENT ── */
  .content { max-width: 700px; margin: 0 auto; padding: 16px 18px 0; }

  .disclaimer {
    font-size: 9px;
    color: var(--dim);
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 7px 12px;
    margin-bottom: 14px;
    font-family: monospace;
  }

  /* ── CARDS ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .card-label {
    font-size: 9px;
    color: var(--dim2);
    letter-spacing: 0.18em;
    font-family: monospace;
    margin-bottom: 5px;
  }

  /* ── FORM ELEMENTS ── */
  select, input {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-size: 13px;
    font-family: monospace;
    outline: none;
    cursor: pointer;
    margin-bottom: 10px;
    -webkit-appearance: none;
    appearance: none;
  }
  select.has-value { border-color: var(--accent); }
  select.has-value-blue { border-color: var(--blue2); }
  input { cursor: text; color: var(--text); }
  input::placeholder { color: var(--dim); }
  optgroup { color: var(--muted); }

  /* ── BUTTONS ── */
  .btn {
    width: 100%;
    padding: 11px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--dim);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.18em;
    cursor: not-allowed;
    font-family: monospace;
    transition: all 0.2s;
  }
  .btn.active-red  { background: var(--accent); border-color: var(--accent); color: #fff; cursor: pointer; }
  .btn.active-blue { background: var(--blue2);  border-color: var(--blue2);  color: #fff; cursor: pointer; }
  .btn.loading-btn { background: var(--bg3); border-color: var(--border); color: #60a5fa; cursor: not-allowed; }

  /* ── FILTER CHIPS ── */
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .fchip {
    padding: 5px 10px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--dim2);
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    font-family: monospace;
  }
  .fchip.active { background: #2563eb22; border-color: var(--blue2); color: #93c5fd; }

  /* ── CHIP ── */
  .chip {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid var(--dim);
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    font-family: monospace;
    margin-right: 6px;
    margin-bottom: 4px;
  }
  .chip.green  { border-color: var(--green);  color: var(--green); }
  .chip.yellow { border-color: var(--yellow); color: var(--yellow); }
  .chip.red    { border-color: var(--red);    color: var(--red); }
  .chip.blue   { border-color: var(--blue);   color: var(--blue); }

  /* ── CONFIDENCE BAR ── */
  .bar-wrap { display: flex; align-items: center; gap: 8px; }
  .bar-track {
    flex: 1; height: 5px;
    background: #0f1929;
    border-radius: 3px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }
  .bar-label {
    font-size: 13px;
    font-weight: 800;
    font-family: monospace;
    min-width: 34px;
  }

  /* ── BET CARDS ── */
  .bet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .bet-card {
    background: var(--bg3);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 13px;
  }
  .bet-card-head { display: flex; justify-content: space-between; margin-bottom: 7px; align-items: center; }
  .bet-card-title { font-size: 9px; font-family: monospace; font-weight: 800; letter-spacing: 0.12em; color: var(--dim2); }
  .bet-card-pick  { font-size: 15px; font-weight: 900; font-family: monospace; margin-bottom: 7px; }
  .bet-card-sub   { font-size: 10px; color: var(--dim2); margin-top: 5px; }
  .bet-card-kelly { font-size: 10px; color: var(--yellow); margin-top: 4px; }

  /* ── SP INFO BOX ── */
  .sp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .sp-box {
    background: var(--bg3);
    border-radius: 6px;
    padding: 8px 10px;
    border: 1px solid var(--border);
  }
  .sp-box.live-border { border-color: #22d3a544; }
  .sp-box-head { display: flex; justify-content: space-between; margin-bottom: 2px; }
  .sp-box-label { font-size: 8px; color: var(--dim); letter-spacing: 0.15em; font-family: monospace; }
  .sp-box-live  { font-size: 8px; font-family: monospace; }
  .sp-box-name  { font-size: 12px; font-weight: 700; color: var(--text); }
  .sp-box-stats { font-size: 9px; color: var(--muted); margin-top: 2px; }

  /* ── WIN PROBABILITY ── */
  .winprob-grid { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; }
  .winprob-name { font-size: 11px; color: #64748b; margin-bottom: 3px; }
  .winprob-pct  { font-size: 28px; font-weight: 900; font-family: monospace; }
  .winprob-vs   { font-size: 11px; color: var(--dim2); font-family: monospace; }
  .winprob-kelly{ font-size: 10px; color: var(--yellow); margin-top: 8px; font-family: monospace; }

  /* ── FACTORS ── */
  .factors-box {
    background: var(--bg3);
    border-radius: 8px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    margin-bottom: 14px;
  }
  .factors-title { font-size: 9px; color: var(--dim); letter-spacing: 0.18em; font-family: monospace; margin-bottom: 8px; }
  .factor-row    { display: flex; gap: 8px; margin-bottom: 6px; align-items: flex-start; }
  .factor-dot    { font-size: 10px; margin-top: 2px; flex-shrink: 0; }
  .factor-text   { font-size: 11px; color: var(--muted); line-height: 1.5; }

  /* ── PROP RESULT ── */
  .prop-header {
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .prop-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .prop-name { font-size: 18px; font-weight: 900; font-family: monospace; color: var(--text); }
  .prop-team { font-size: 11px; color: var(--dim2); margin-top: 2px; }
  .prop-line { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .prop-note { font-size: 10px; color: #374151; margin-top: 3px; }
  .prop-pick-badge {
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 20px;
    font-weight: 900;
    font-family: monospace;
  }
  .prop-conf-label { font-size: 9px; letter-spacing: 0.15em; font-family: monospace; margin-bottom: 6px; color: var(--dim2); margin-top: 12px; }
  .prop-stat { font-size: 10px; color: var(--yellow); margin-top: 8px; font-family: monospace; }

  /* ── LOADING SPINNER ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  /* ── HIDDEN ── */
  .hidden { display: none !important; }
</style>
</head>

// ═══════════════════════════════════════════════════════════════════════════
// MLB API — Direct fetch (works outside Claude sandbox)
// ═══════════════════════════════════════════════════════════════════════════

function todayET() {
  return new Date().toLocaleDateString('en-CA', { timeZone: 'America/New_York' });
}

async function mlbFetch(path) {
  const res = await fetch('https://statsapi.mlb.com' + path, {
    headers: { 'Accept': 'application/json' },
    signal: AbortSignal.timeout(10000)
  });
  if (!res.ok) throw new Error('MLB API ' + res.status);
  return res.json();
}

async function fetchSchedule() {
  const date = todayET();
  const data = await mlbFetch(`/api/v1/schedule?sportId=1&date=${date}&hydrate=probablePitcher,team,weather`);
  const games = [];
  for (const d of (data.dates || [])) {
    for (const g of (d.games || [])) {
      const st = g.status?.abstractGameState;
      if (st !== 'Preview' && st !== 'Pre-Game' && st !== 'Scheduled') continue;
      const away = g.teams?.away?.team?.name || '';
      const home = g.teams?.home?.team?.name || '';
      const awayPId = g.teams?.away?.probablePitcher?.id || null;
      const homePId = g.teams?.home?.probablePitcher?.id || null;
      const awayPName = g.teams?.away?.probablePitcher?.fullName || null;
      const homePName = g.teams?.home?.probablePitcher?.fullName || null;
      const awayTId = g.teams?.away?.team?.id || null;
      const homeTId = g.teams?.home?.team?.id || null;
      const wx = g.weather || null;
      const gt = g.gameDate ? new Date(g.gameDate).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'}) : 'TBD';
      if (away && home) games.push({ away, home, time:gt, awayPId, homePId, awayPName, homePName, awayTId, homeTId, weather:wx });
    }
  }
  return { games, date };
}

async function fetchPitcherStats(id) {
  if (!id) return null;
  try {
    const data = await mlbFetch(`/api/v1/people/${id}/stats?stats=season&group=pitching&season=2026`);
    const s = data.stats?.[0]?.splits?.[0]?.stat;
    if (!s) return null;
    const era  = parseFloat(s.era)  || null;
    const whip = parseFloat(s.whip) || null;
    const k9   = parseFloat(s.strikeoutsPer9Inn) || null;
    const bb9  = parseFloat(s.walksPer9Inn)      || null;
    const ip   = parseFloat(s.inningsPitched)    || null;
    const gs   = parseInt(s.gamesStarted)        || 0;
    const wins = s.wins || 0; const losses = s.losses || 0;
    const fip  = era && bb9 && k9 ? parseFloat((era + (bb9 - k9) * 0.15).toFixed(2)) : null;
    return { era, whip, k9, bb9, ip, gs, wins, losses, fip };
  } catch { return null; }
}

async function fetchTeamStats(id) {
  if (!id) return null;
  try {
    const data = await mlbFetch(`/api/v1/teams/${id}/stats?stats=season&group=hitting&season=2026`);
    const s = data.stats?.[0]?.splits?.[0]?.stat;
    if (!s) return null;
    return {
      avg:  parseFloat(s.avg)  || null,
      ops:  parseFloat(s.ops)  || null,
      rpg:  parseFloat(s.runsPerGame) || null,
      hrpg: s.homeRuns && s.gamesPlayed ? s.homeRuns/s.gamesPlayed : null,
    };
  } catch { return null; }
}

async function fetchStandings() {
  try {
    const data = await mlbFetch('/api/v1/standings?leagueId=103,104&season=2026&standingsTypes=regularSeason');
    const map = {};
    for (const rec of (data.records || [])) {
      for (const t of (rec.teamRecords || [])) {
        map[t.team.id] = {
          wPct:   parseFloat(t.winningPercentage) || 0.5,
          wins:   t.wins || 0,
          losses: t.losses || 0,
          streak: t.streak?.streakNumber || 0,
          streakType: t.streak?.streakType || 'W',
          gb:     t.gamesBack || '0',
        };
      }
    }
    return map;
  } catch { return {}; }
}

let appGames = [];       // enriched game objects
let appStandings = {};   // teamId → standings data
let currentFilter = 'all';

// ═══════════════════════════════════════════════════════════════════════════
// INIT

async function init() {
  setStatus('loading', '⟳ LOADING', 'CONNECTING...');
  setBanner('loading', '⏳ Connecting to MLB Stats API...');

  // --- Step 1: Schedule ---
  let scheduleGames = [], scheduleDate = '';
  try {
    const { games, date } = await fetchSchedule();
    scheduleGames = games;
    scheduleDate  = date;
    setStatus('partial', '◑ SCHEDULE LIVE', 'ENRICHING STATS...');
    setBanner('partial', '✓ Schedule loaded from MLB API — fetching live pitcher & team stats...');
    populateGameSelect(scheduleGames, scheduleDate, false);
  } catch (e) {
    console.warn('Schedule fetch failed:', e);
    setStatus('offline', '⚠ OFFLINE MODE', 'FALLBACK SLATE');
    setBanner('offline', '⚠ MLB API unreachable — using hardcoded fallback slate. Open the file in a browser for live data.');
    const fallback = getFallback();
    populateGameSelect(fallback.games, fallback.date, false);
    appGames = fallback.games.map(g => ({ ...g }));
    populatePlayerSelect();
    return;
  }

  // --- Step 2: Parallel enrichment ---
  const [standings, ...enriched] = await Promise.all([
    fetchStandings(),
    ...scheduleGames.map(enrichGame),
  ]);
  appStandings = standings;
  appGames = enriched;

  const hasLive = appGames.some(g => g.awayLiveSP || g.homeLiveSP || g.awayTeamStats);
  setStatus(hasLive ? 'live' : 'partial',
    hasLive ? '● LIVE DATA' : '◑ SCHEDULE LIVE',
    hasLive ? 'MLB API ACTIVE' : 'BASE STATS ONLY');
  setBanner(hasLive ? 'live' : 'partial',
    hasLive
      ? '✅ Live MLB data active — real pitcher stats, team R/G, OPS & standings updated now'
      : '⚡ Schedule loaded — some stats may be using baseline data');

  populateGameSelect(appGames, scheduleDate, true);
  populatePlayerSelect();
}

async function enrichGame(g) {
  try {
    const [awayLiveSP, homeLiveSP, awayTeamStats, homeTeamStats] = await Promise.all([
      fetchPitcherStats(g.awayPId),
      fetchPitcherStats(g.homePId),
      fetchTeamStats(g.awayTId),
      fetchTeamStats(g.homeTId),
    ]);
    return { ...g, awayLiveSP, homeLiveSP, awayTeamStats, homeTeamStats, awayLiveName: g.awayPName, homeLiveName: g.homePName };
  } catch { return { ...g }; }
}

function cc(v) { return v >= 72 ? '#22d3a5' : v >= 62 ? '#fbbf24' : '#f87171'; }
function cl(v) { return v >= 72 ? 'HIGH'    : v >= 62 ? 'MED'     : 'LOW'; }

function probToConf(p) {
  return Math.round(Math.min(88, Math.max(55, 55 + (p - 0.5) * 110)));
}
function kelly(prob, dec) {
  const b = dec - 1;
  return Math.round(Math.max(0, Math.min(0.18, (b * prob - (1 - prob)) / b)) * 1000) / 10;
}
function toAmerican(p) {
  return p >= 0.5 ? `-${Math.round((p / (1 - p)) * 100)}` : `+${Math.round(((1 - p) / p) * 100)}`;
}

function mergeSP(base, liveName, liveStats) {
  if (!liveStats) return base;
  const era  = liveStats.era  ?? base.era;
  const whip = liveStats.whip ?? base.whip;
  const k9   = liveStats.k9   ?? base.k9;
  const bb9  = liveStats.bb9  ?? base.bb9;
  const fip  = era && bb9 && k9 ? parseFloat((era + (bb9 - k9) * 0.15).toFixed(2)) : base.fip;
  const nrfi = liveStats.era ? Math.min(0.75, Math.max(0.45, base.nrfi + (base.era - era) * 0.015)) : base.nrfi;
  return { ...base, name: liveName || base.name, era, whip, k9, bb9, fip, nrfi, liveData: true };
}

function getStandingData(teamId) {
  return appStandings[teamId] || null;
}

function analyzeGame(gameObj) {
  const { away, home, awayLiveSP, homeLiveSP, awayTeamStats, homeTeamStats, awayLiveName, homeLiveName, awayTId, homeTId, weather } = gameObj;

  const TB = TEAM_BASE[away] || DEF_TEAM;
  const HB = TEAM_BASE[home] || DEF_TEAM;
  const AS = mergeSP(SP_BASE[away] || DEF_SP, awayLiveName, awayLiveSP);
  const HS = mergeSP(SP_BASE[home] || DEF_SP, homeLiveName, homeLiveSP);
  const park = PARKS[home] || { f:1.0, type:'Neutral' };

  // Live team stats
  const aRPG = awayTeamStats?.rpg ?? 4.3;
  const hRPG = homeTeamStats?.rpg ?? 4.3;
  const aOPS = awayTeamStats?.ops ?? 0.735;
  const hOPS = homeTeamStats?.ops ?? 0.735;

  // Live standings
  const aSt = getStandingData(awayTId);
  const hSt = getStandingData(homeTId);
  const aWPct  = aSt?.wPct  ?? 0.500;
  const hWPct  = hSt?.wPct  ?? 0.500;
  const aStreak = aSt ? (aSt.streakType === 'W' ? aSt.streak : -aSt.streak) : 0;
  const hStreak = hSt ? (hSt.streakType === 'W' ? hSt.streak : -hSt.streak) : 0;

  const h2hAdj = HB.h2hAdv?.[away] || 0;
  const aFipQ  = (5.0 - AS.fip) / 5.0;
  const hFipQ  = (5.0 - HS.fip) / 5.0;
  const aCmd   = Math.max(0, 1 - (AS.bb9 - 2.0) * 0.04);
  const hCmd   = Math.max(0, 1 - (HS.bb9 - 2.0) * 0.04);

  // Weather adjustments
  let wxRunAdj = 0, wxNRFIAdj = 0;
  const dome = ['Miami Marlins','Tampa Bay Rays','Houston Astros','Toronto Blue Jays','Minnesota Twins'].includes(home)
            || (weather?.condition?.toLowerCase().includes('dome'));
  if (!dome && weather) {
    const temp = parseFloat(weather.temp) || 68;
    const wind = parseFloat(weather.wind) || 5;
    const wdir = (weather.condition || '').toLowerCase();
    if (wdir.includes('out')) { wxRunAdj += Math.min(0.3, wind * 0.02); wxNRFIAdj -= 0.015; }
    if (wdir.includes('in'))  { wxRunAdj -= Math.min(0.25, wind * 0.018); wxNRFIAdj += 0.02; }
    if (temp < 50) { wxRunAdj -= 0.15; wxNRFIAdj += 0.025; }
    if (temp > 75) { wxRunAdj += 0.10; }
    if (parseFloat(weather.precipitation) > 25) { wxRunAdj -= 0.08; }
  }

  const aScore = aWPct*0.20 + (aSt ? aSt.wPct : 0.5)*0.12 + aFipQ*0.20 + aCmd*0.06
    + (1-TB.bera/6)*0.12 + (aRPG/5.5)*0.12 + (aOPS/0.82)*0.08
    + Math.min(1,(aStreak+6)/12)*0.06 + ((TB.h2hAdv?.[home]||0)>0 ? TB.h2hAdv[home]*0.4 : 0);
  const hScore = hWPct*0.20 + (hSt ? hSt.wPct : 0.5)*0.12 + hFipQ*0.20 + hCmd*0.06
    + (1-HB.bera/6)*0.12 + (hRPG/5.5)*0.12 + (hOPS/0.82)*0.08
    + Math.min(1,(hStreak+6)/12)*0.06 + (h2hAdj>0 ? h2hAdj*0.4 : 0) + 0.028;

  const tot   = aScore + hScore;
  const hWin  = Math.min(0.80, Math.max(0.20, hScore/tot));
  const aWin  = 1 - hWin;
  const mlW   = hWin >= aWin ? home : away;
  const mlP   = Math.max(hWin, aWin);
  const mlC   = probToConf(mlP);

  const favH  = mlW === home;
  const favT  = favH ? HB : TB, favSP = favH ? HS : AS, dogRA = favH ? TB.avgRA : HB.avgRA;
  const rlRaw = (favH ? favT.rlCoverHome : favT.rlCoverAway)
    + favSP.ace*0.022
    + ((favH?hRPG:aRPG) - dogRA)*0.015
    + (( favH ? hStreak : aStreak) > 3 ? 0.018 : (favH ? hStreak : aStreak) < -2 ? -0.015 : 0)
    + Math.abs(h2hAdj)*0.25*(favH?1:-1);
  const rlP   = Math.min(0.76, Math.max(0.40, rlRaw));
  const rlC   = probToConf(rlP);
  const favS  = mlW.split(' ').slice(-1)[0];
  const dogS  = (favH?away:home).split(' ').slice(-1)[0];
  const rlPick= rlP >= 0.54 ? `${favS} -1.5` : `${dogS} +1.5`;

  const expA  = (aRPG*0.50 + HS.era/9*3.1)*park.f + wxRunAdj*0.5;
  const expH  = (hRPG*0.50 + AS.era/9*3.1)*park.f + wxRunAdj*0.5;
  const fipAdj= ((AS.fip-AS.era)+(HS.fip-HS.era))*0.10;
  const expT  = expA + expH + fipAdj;
  const oP    = Math.min(0.77, Math.max(0.23, 0.5 + ((expT-8.5)/8.5)*1.5 + ((TB.o85Rate+HB.o85Rate)/2-0.5)*0.6));
  const tC    = probToConf(Math.max(oP, 1-oP));

  const nrfiRaw = (AS.nrfi+HS.nrfi)/2*0.42 + (TB.nrfiRate+HB.nrfiRate)/2*0.26
    + ((AS.nrfi+HS.nrfi)/2+(park.f>1.05?-0.045:park.f<0.96?0.045:0))*0.18
    + ((5.0-AS.fip)/5.0+(5.0-HS.fip)/5.0)/2*0.04 + wxNRFIAdj + 0.04;
  const nrfiP = Math.min(0.79, Math.max(0.36, nrfiRaw));
  const nrfiC = probToConf(Math.max(nrfiP, 1-nrfiP));
  const nrfiPick = nrfiP >= 0.55 ? 'NRFI' : nrfiP <= 0.45 ? 'YRFI' : 'PASS';

  const sc  = { ml:mlC, rl:rlC, total:tC, nrfi:nrfiC };
  const best= Object.entries(sc).sort((a,b)=>b[1]-a[1])[0][0];

  const fx = [];
  const aTag = AS.liveData ? '🟢' : '📊';
  const hTag = HS.liveData ? '🟢' : '📊';
  fx.push(`${aTag} ${AS.name}: ${AS.era} ERA / ${AS.fip} FIP / ${AS.bb9} BB/9`);
  fx.push(`${hTag} ${HS.name}: ${HS.era} ERA / ${HS.fip} FIP / ${HS.bb9} BB/9`);
  if (awayTeamStats) fx.push(`🟢 ${away}: ${aRPG.toFixed(2)} R/G · .${Math.round(aOPS*1000)} OPS (live)`);
  if (homeTeamStats) fx.push(`🟢 ${home}: ${hRPG.toFixed(2)} R/G · .${Math.round(hOPS*1000)} OPS (live)`);
  if (aSt) fx.push(`📊 ${away}: ${aSt.wins}-${aSt.losses} (${(aSt.wPct*100).toFixed(0)}%) · ${aSt.streakType}${aSt.streak}`);
  if (hSt) fx.push(`📊 ${home}: ${hSt.wins}-${hSt.losses} (${(hSt.wPct*100).toFixed(0)}%) · ${hSt.streakType}${hSt.streak}`);
  if (Math.abs(h2hAdj) >= 0.05) fx.push(`H2H edge: ${h2hAdj>0?home:away} dominates this series`);
  if (!dome && weather?.temp) fx.push(`Weather: ${weather.temp}°F ${weather.condition||''} — ${wxRunAdj>0.05?'favors offense':wxRunAdj<-0.05?'favors pitching':'neutral impact'}`);
  if (park.f > 1.05) fx.push(`${park.type} park — boosts projected total to ${expT.toFixed(1)}`);
  else if (park.f < 0.96) fx.push(`${park.type} park — suppresses scoring, proj ${expT.toFixed(1)}`);
  else fx.push(`Projected total: ${expT.toFixed(1)} runs vs 8.5 line`);

  return {
    away, home,
    awayStarter:AS.name, homeStarter:HS.name,
    awayERA:AS.era, homeERA:HS.era, awayFIP:AS.fip, homeFIP:HS.fip, awayBB9:AS.bb9, homeBB9:HS.bb9,
    awayLive:AS.liveData||false, homeLive:HS.liveData||false,
    awayTeamLive:!!awayTeamStats, homeTeamLive:!!homeTeamStats,
    parkType:park.type, expTotal:expT.toFixed(1), dome,
    mlWinner:mlW, mlProb:mlP, mlConf:mlC, mlOdds:toAmerican(mlP), mlKelly:kelly(mlP,1.85),
    hWinP:Math.round(hWin*100), aWinP:Math.round(aWin*100),
    rlPick, rlProb:rlP, rlConf:rlC,
    totalLine:8.5, totalPick:oP>=0.5?'OVER':'UNDER', totalConf:tC, overProb:oP,
    nrfiPick, nrfiProb:nrfiP, nrfiConf:nrfiC,
    bestBet:best, factors:fx.slice(0,6),
  };
}

function analyzeProp(key, type, customLine) {
  const p = PLAYERS[key]; if (!p) return null;
  if (p.type === 'pitcher') {
    const kpg = p.kpg9/9*6, line = customLine ?? parseFloat((kpg-.5).toFixed(1));
    const oP = Math.min(.82, Math.max(.18, .5+(kpg-line)*.14));
    const c  = probToConf(Math.max(oP,1-oP));
    return { player:p.name,team:p.team,prop:'Strikeouts',line,pick:oP>=.5?'OVER':'UNDER',conf:c,
      edge:c>=72?'Sharp':c>=62?'Moderate':'Lean',kellyPct:kelly(Math.max(oP,1-oP),1.85),
      stat:`${p.kpg9} K/9 → ~${kpg.toFixed(1)} proj`,note:`${p.era} ERA · ${p.fip} FIP · ${p.whip} WHIP`,
      factors:[`Projects ${kpg.toFixed(1)} Ks at ${p.kpg9} K/9 over ~6 IP`,`FIP ${p.fip} — true talent indicator`,
        kpg>line?`Line ${line} is below projection — OVER value`:`Line ${line} is above projection — UNDER value`]};
  }
  const m = {hits:{b:p.hitpg,d:1.5},rbis:{b:p.rbipg,d:.5},hr:{b:p.hrpg*10,d:.5},runs:{b:p.runspg,d:.5}};
  const pd = m[type]||m.hits, line = customLine??pd.d;
  const oP = Math.min(.83, Math.max(.17, .5+(pd.b-line)*(type==='hr'?.32:.30)+(p.trend||0)*.04));
  const c  = probToConf(Math.max(oP,1-oP));
  const lb = {hits:'Hits',rbis:'RBIs',hr:'Home Runs',runs:'Runs'}[type]||'Hits';
  return { player:p.name,team:p.team,prop:lb,line,pick:oP>=.5?'OVER':'UNDER',conf:c,
    edge:c>=72?'Sharp':c>=62?'Moderate':'Lean',kellyPct:kelly(Math.max(oP,1-oP),1.85),
    stat:`${pd.b.toFixed(2)} ${lb}/G`,note:`.${Math.round(p.avg*1000)} AVG · .${Math.round(p.obp*1000)} OBP · .${Math.round(p.slg*1000)} SLG`,
    factors:[`Season avg ${pd.b.toFixed(2)} ${lb.toLowerCase()}/game vs line of ${line}`,
      `Splits: vR .${Math.round(p.vsR*1000)} · vL .${Math.round(p.vsL*1000)} · Home .${Math.round(p.home*1000)} · Away .${Math.round(p.away*1000)}`,
      p.trend===1?'Hot streak — trending up':p.trend===-1?'Cold stretch — trending down':'Neutral form']};
}

function barHTML(v) {
  const c = cc(v);
  return `<div class="bar-wrap">
    <div class="bar-track"><div class="bar-fill" style="width:${v}%;background:${c}"></div></div>
    <span class="bar-label" style="color:${c}">${v}%</span>
  </div>`;
}

function chipHTML(text, cls='') {
  return `<span class="chip ${cls}">${text}</span>`;
}

function betCardHTML(title, pick, conf, sub, isHighlight, kelly) {
  const c = cc(conf||55);
  const border = isHighlight ? `1.5px solid ${c}` : '1.5px solid var(--border)';
  const bg     = isHighlight ? `${c}15` : 'var(--bg3)';
  const titleCol = isHighlight ? c : 'var(--dim2)';
  return `
    <div class="bet-card" style="background:${bg};border:${border}">
      <div class="bet-card-head">
        <span class="bet-card-title" style="color:${titleCol}">${title}${isHighlight?' ★':''}</span>
        <span class="chip" style="border-color:${c};color:${c}">${cl(conf)}</span>
      </div>
      <div class="bet-card-pick" style="color:${pick==='PASS'?'var(--dim)':'var(--text)'}">${pick||'—'}</div>
      ${barHTML(conf||55)}
      ${sub ? `<div class="bet-card-sub">${sub}</div>` : ''}
      ${kelly>0 ? `<div class="bet-card-kelly">Kelly: ${kelly}% bankroll</div>` : ''}
    </div>`;
}

function runGameAnalysis() {
  const idx = parseInt(document.getElementById('gameSelect').value);
  if (isNaN(idx)) return;

  const btn = document.getElementById('btnAnalyze');
  btn.textContent = '⟳  ANALYZING...';
  btn.className = 'btn loading-btn';
  btn.disabled = true;

  setTimeout(() => {
    const gameObj = appGames[idx];
    if (!gameObj) { btn.textContent = '▶  GENERATE PICKS'; btn.className = 'btn active-red'; btn.disabled = false; return; }
    const r = analyzeGame(gameObj);
    renderGameResult(r);
    btn.textContent = '▶  GENERATE PICKS';
    btn.className = 'btn active-red';
    btn.disabled = false;
  }, 100);
}

function renderGameResult(r) {
  const best = r.bestBet;
  const html = `
    <!-- Game header -->
    <div class="card">
      <div style="font-size:15px;font-weight:900;font-family:monospace;color:var(--text);margin-bottom:12px">${r.away} @ ${r.home}</div>
      <div class="sp-grid">
        ${['away','home'].map(side => {
          const name  = side==='away'?r.awayStarter:r.homeStarter;
          const era   = side==='away'?r.awayERA:r.homeERA;
          const fip   = side==='away'?r.awayFIP:r.homeFIP;
          const bb9   = side==='away'?r.awayBB9:r.homeBB9;
          const live  = side==='away'?r.awayLive:r.homeLive;
          return `<div class="sp-box ${live?'live-border':''}">
            <div class="sp-box-head">
              <span class="sp-box-label">${side.toUpperCase()} SP</span>
              <span class="sp-box-live" style="color:${live?'var(--green)':'var(--muted)'}">${live?'🟢 LIVE':'📊 BASE'}</span>
            </div>
            <div class="sp-box-name">${name}</div>
            <div class="sp-box-stats">ERA ${era} · FIP ${fip} · BB/9 ${bb9}</div>
          </div>`;
        }).join('')}
      </div>
      <div style="margin-top:4px">
        ${chipHTML(r.parkType)}
        ${chipHTML('PROJ: '+r.expTotal+' runs','blue')}
        ${r.dome ? chipHTML('DOME','') : ''}
        ${best ? chipHTML('BEST: '+best.toUpperCase(),'yellow') : ''}
      </div>
    </div>

    <!-- Win probability -->
    <div class="card">
      <div class="card-label">WIN PROBABILITY</div>
      <div class="winprob-grid">
        <div>
          <div class="winprob-name">${r.away.split(' ').slice(-1)[0]}</div>
          <div class="winprob-pct" style="color:${r.mlWinner===r.away?'var(--green)':'#374151'}">${r.aWinP}%</div>
        </div>
        <div class="winprob-vs">VS</div>
        <div style="text-align:right">
          <div class="winprob-name" style="text-align:right">${r.home.split(' ').slice(-1)[0]}</div>
          <div class="winprob-pct" style="color:${r.mlWinner===r.home?'var(--green)':'#374151'}">${r.hWinP}%</div>
        </div>
      </div>
      <div class="winprob-kelly">LINE: ${r.mlOdds} · Kelly: ${r.mlKelly}% bankroll</div>
    </div>

    <!-- Bet cards -->
    <div class="bet-grid">
      ${betCardHTML('MONEYLINE',    r.mlWinner.split(' ').slice(-1)[0], r.mlConf,   `${Math.max(r.hWinP,r.aWinP)}% win prob`, best==='ml',    r.mlKelly)}
      ${betCardHTML('RUN LINE',     r.rlPick,                           r.rlConf,   `${Math.round(r.rlProb*100)}% cover rate`, best==='rl',    0)}
      ${betCardHTML(`TOTAL (${r.totalLine})`, r.totalPick,             r.totalConf, `Proj: ${r.expTotal} runs`,                best==='total', 0)}
      ${betCardHTML('NRFI/YRFI',    r.nrfiPick,                         r.nrfiConf,  `${Math.round(r.nrfiProb*100)}% NRFI prob`,best==='nrfi',  0)}
    </div>

    <!-- Factors -->
    <div class="factors-box">
      <div class="factors-title">ALGORITHM FACTORS</div>
      ${r.factors.map(f=>`
        <div class="factor-row">
          <span class="factor-dot" style="color:var(--accent)">◆</span>
          <span class="factor-text">${f}</span>
        </div>`).join('')}
    </div>`;

  const el = document.getElementById('gameResult');
  el.innerHTML = html;
  el.classList.remove('hidden');
  el.scrollIntoView({ behavior:'smooth', block:'start' });
}

function runPropAnalysis() {
  const pk   = document.getElementById('playerSelect').value;
  const pt   = document.getElementById('propType').value;
  const ln   = parseFloat(document.getElementById('propLine').value) || null;
  if (!pk) return;
  const p    = PLAYERS[pk];
  const type = p?.type === 'pitcher' ? 'strikeouts' : pt;
  const r    = analyzeProp(pk, type, ln);
  if (r) renderPropResult(r);
}

function renderPropResult(r) {
  const pc  = r.pick==='OVER' ? '#22d3a5' : r.pick==='UNDER' ? '#f87171' : '#6b7280';
  const edgeColor = r.edge==='Sharp'?'var(--green)':r.edge==='Moderate'?'var(--yellow)':'var(--muted)';
  const html = `
    <div class="prop-header" style="background:var(--bg2);border:1px solid ${pc}55">
      <div class="prop-top">
        <div>
          <div class="prop-name">${r.player}</div>
          <div class="prop-team">${r.team} · ${r.prop}</div>
          <div class="prop-line">Line: ${r.line}</div>
          <div class="prop-note">${r.note}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <div class="prop-pick-badge" style="background:${pc}18;border:2px solid ${pc};color:${pc}">${r.pick}</div>
          <span class="chip" style="border-color:${edgeColor};color:${edgeColor}">${r.edge}</span>
        </div>
      </div>
      <div class="prop-conf-label">CONFIDENCE</div>
      ${barHTML(r.conf)}
      <div class="prop-stat">${r.stat} · Kelly: ${r.kellyPct}% bankroll</div>
    </div>

    <div class="factors-box">
      <div class="factors-title">ALGORITHM FACTORS</div>
      ${r.factors.map(f=>`
        <div class="factor-row">
          <span class="factor-dot" style="color:var(--blue2)">◆</span>
          <span class="factor-text">${f}</span>
        </div>`).join('')}
    </div>`;

  const el = document.getElementById('propResult');
  el.innerHTML = html;
  el.classList.remove('hidden');
  el.scrollIntoView({ behavior:'smooth', block:'start' });
}

// ─── START ───
init();
</script>
</body>
</html>
