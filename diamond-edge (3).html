function probToConf(p) {
  const x = Math.max(0.50, Math.min(0.95, p));
  const conf = 50 + (x - 0.50) * 2.2 * 100 * Math.pow((x - 0.49), 0.45);
  return Math.round(Math.min(95, Math.max(50, conf)));
}
function blendWithMarket(modelP, marketP) {
  if (!marketP || marketP < 0.3 || marketP > 0.95) return modelP;
  const blended = modelP * 0.60 + marketP * 0.40;
  const agree = (modelP > 0.5) === (marketP > 0.5);
  if (agree) {
    const gap = Math.abs(modelP - 0.5) + Math.abs(marketP - 0.5);
    return Math.min(0.92, blended + gap * 0.08);
  }
  return blended;
}
function cc(v){return v>=78?'#22d3a5':v>=66?'#fbbf24':'#f87171';}
function cl(v){return v>=78?'HIGH':v>=66?'MED':'LOW';}
function toA(p){return p>=0.5?`-${Math.round((p/(1-p))*100)}`:`+${Math.round(((1-p)/p)*100)}`;}
function a2p(o){if(!o)return null;return o>0?100/(o+100):Math.abs(o)/(Math.abs(o)+100);}
function edgeCalc(mp,mo){const ip=a2p(mo);if(!ip)return null;return((mp-ip)*100).toFixed(1);}
function kellyOdds(prob,amo){if(!amo||amo===0)return 0;const dec=amo>0?(amo/100)+1:(100/Math.abs(amo))+1;const b=dec-1,k=(b*prob-(1-prob))/b;return Math.round(Math.max(0,Math.min(0.20,k))*1000)/10;}

async function fetchSchedule(){
  const date=todayET();
  const data=await mlb(`/api/v1/schedule?sportId=1&date=${date}&hydrate=probablePitcher,team,weather,officials`);
  const games=[];
  for(const d of(data.dates||[])){for(const g of(d.games||[])){
    const st=g.status?.abstractGameState;
    if(st!=='Preview'&&st!=='Pre-Game'&&st!=='Scheduled')continue;
    // Get HP umpire
    const umpire = (g.officials||[]).find(o=>o.officialType==='Home Plate')?.official?.fullName||null;
    games.push({
      away:g.teams?.away?.team?.name||'',home:g.teams?.home?.team?.name||'',
      awayPId:g.teams?.away?.probablePitcher?.id||null,homePId:g.teams?.home?.probablePitcher?.id||null,
      awayPName:g.teams?.away?.probablePitcher?.fullName||null,homePName:g.teams?.home?.probablePitcher?.fullName||null,
      awayTId:g.teams?.away?.team?.id||null,homeTId:g.teams?.home?.team?.id||null,
      weather:g.weather||null,umpire,
      time:g.gameDate?new Date(g.gameDate).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'}):'TBD',
    });
  }}
  return{games,date};
}

// FIX #1 & #4: Filter non-starts from game log, regress fi_era to mean
async function fetchPitcherStats(id){
  if(!id)return null;
  try{
    const data=await mlb(`/api/v1/people/${id}/stats?stats=season,gameLog&group=pitching&season=2026&limit=10`);
    const season=data.stats?.find(s=>s.type?.displayName==='season')?.splits?.[0]?.stat;
    // FIX: Only include STARTS (not relief appearances) — min 3 IP per outing
    const allLogs=data.stats?.find(s=>s.type?.displayName==='gameLog')?.splits||[];
    const startLogs=allLogs.filter(l=>{
      const ip=parseFloat(l.stat?.inningsPitched)||0;
      const gs=parseInt(l.stat?.gamesStarted)||0;
      return ip>=3.0 && gs>=1; // must be a start with 3+ IP
    });
    // Last 3 starts ERA — regression to season mean if <3 starts
    let l3ip=0,l3er=0;
    for(const l of startLogs.slice(0,3)){const ip=parseFloat(l.stat?.inningsPitched)||0;l3ip+=ip;l3er+=parseFloat(l.stat?.earnedRuns)||0;}
    const l3eraRaw=l3ip>0?parseFloat(((l3er/l3ip)*9).toFixed(2)):null;
    // FIX: Regress to season ERA based on sample size
    const seasonERA=parseFloat(season?.era)||4.20;
    let l3era=null;
    if(l3eraRaw!==null){
      const nStarts=startLogs.slice(0,3).length;
      // Regression weight: 3 starts = 60% raw, 2 starts = 40%, 1 start = 25%
      const rawWeight=[0,0.25,0.40,0.60][Math.min(nStarts,3)];
      l3era=parseFloat((l3eraRaw*rawWeight+seasonERA*(1-rawWeight)).toFixed(2));
    }
    // FIX: First-inning ERA — use starts only, regress to mean
    // Use season ERA as proxy with park-neutral adjustment (true fi_era needs split data)
    const fi_era_raw=season?.era?parseFloat(season.era):4.20;
    // Approximate fi_era from season ERA (first inning ~10% harder than avg)
    const fi_era=parseFloat((fi_era_raw*0.95).toFixed(2));
    if(!season)return null;
    const era=parseFloat(season.era)||null,whip=parseFloat(season.whip)||null;
    const k9=parseFloat(season.strikeoutsPer9Inn)||null,bb9=parseFloat(season.walksPer9Inn)||null;
    const fip=era&&bb9&&k9?parseFloat((era+(bb9-k9)*0.15).toFixed(2)):null;
    const wins=season.wins||0,losses=season.losses||0,gs=parseInt(season.gamesStarted)||0;

    // FIX #5: Pitcher rest days
    let restDays=5;
    if(startLogs.length>0){
      const lastStartDate=startLogs[0]?.date;
      if(lastStartDate){
        const daysSince=Math.round((new Date()-new Date(lastStartDate))/(1000*60*60*24));
        restDays=Math.max(1,Math.min(10,daysSince));
      }
    }
    // Rest adjustment: 4 days = slight penalty, 5 = normal, 6+ = small boost, 3 = bigger penalty
    const restAdj=restDays<=3?-0.15:restDays===4?-0.06:restDays>=7?0.05:0;

    // FIX #6: Home/away ERA splits (approximated from season data)
    // MLB API home/away splits
    let homeERA=era,awayERA=era;
    try{
      const splits=await mlb(`/api/v1/people/${id}/stats?stats=statSplits&group=pitching&season=2026&sitCodes=h,a`);
      const homeSplit=splits.stats?.[0]?.splits?.find(s=>s.split?.code==='h')?.stat;
      const awaySplit=splits.stats?.[0]?.splits?.find(s=>s.split?.code==='a')?.stat;
      if(homeSplit?.era)homeERA=parseFloat(homeSplit.era);
      if(awaySplit?.era)awayERA=parseFloat(awaySplit.era);
    }catch{}

    // FIX #6: Career ERA vs specific opponents (pitcher H2H)
    // We'll pass the pitcher ID back and fetch when we know the opponent
    return{era,whip,k9,bb9,fip,fi_era,l3era,wins,losses,gs,restDays,restAdj,homeERA,awayERA,id};
  }catch{return null;}
}

async function fetchPitcherVsTeam(pitcherId, teamId){
  if(!pitcherId||!teamId)return null;
  try{
    const data=await mlb(`/api/v1/people/${pitcherId}/stats?stats=vsTeam&group=pitching&season=2026&opposingTeamId=${teamId}`);
    const s=data.stats?.[0]?.splits?.[0]?.stat;
    if(!s||!s.gamesPlayed)return null;
    return{
      era:parseFloat(s.era)||null,
      whip:parseFloat(s.whip)||null,
      k9:parseFloat(s.strikeoutsPer9Inn)||null,
      gp:parseInt(s.gamesPlayed)||0,
      ip:parseFloat(s.inningsPitched)||0,
    };
  }catch{return null;}
}

async function fetchTeamStats(id){
  if(!id)return null;
  try{
    const[hit,pit]=await Promise.all([mlb(`/api/v1/teams/${id}/stats?stats=season&group=hitting&season=2026`),mlb(`/api/v1/teams/${id}/stats?stats=season&group=pitching&season=2026`)]);
    const hs=hit.stats?.[0]?.splits?.[0]?.stat,ps=pit.stats?.[0]?.splits?.[0]?.stat;
    return{avg:parseFloat(hs?.avg)||null,ops:parseFloat(hs?.ops)||null,rpg:parseFloat(hs?.runsPerGame)||null,bERA:parseFloat(ps?.era)||null};
  }catch{return null;}
}

// FIX #8: Rolling last 7 days offense
async function fetchRollingOffense(teamId){
  if(!teamId)return null;
  try{
    const data=await mlb(`/api/v1/teams/${teamId}/stats?stats=byDateRange&group=hitting&season=2026&startDate=${getDateDaysAgo(7)}&endDate=${todayET()}`);
    const s=data.stats?.[0]?.splits?.[0]?.stat;
    if(!s)return null;
    return{
      ops:parseFloat(s.ops)||null,
      rpg:parseFloat(s.runsPerGame)||null,
      avg:parseFloat(s.avg)||null,
    };
  }catch{return null;}
}

function getDateDaysAgo(n){
  const d=new Date();d.setDate(d.getDate()-n);
  return d.toLocaleDateString('en-CA',{timeZone:'America/New_York'});
}

async function fetchInjuries(teamId){
  if(!teamId)return[];
  try{const data=await mlb(`/api/v1/teams/${teamId}/roster?rosterType=injuries`);return(data.roster||[]).slice(0,4).map(p=>({name:p.person?.fullName||'Unknown',status:p.status?.description||'IL',pos:p.position?.abbreviation||'?'}));}
  catch{return[];}
}

async function fetchBullpenFatigue(teamId){
  if(!teamId)return 0;
  try{
    const roster=await mlb(`/api/v1/teams/${teamId}/roster?rosterType=active`);
    const rp=(roster.roster||[]).filter(p=>p.position?.abbreviation==='RP').slice(0,6);
    let totalIP=0;
    await Promise.all(rp.map(async p=>{try{const d=await mlb(`/api/v1/people/${p.person.id}/stats?stats=gameLog&group=pitching&season=2026&limit=3`);for(const l of(d.stats?.[0]?.splits||[]))totalIP+=parseFloat(l.stat?.inningsPitched)||0;}catch{}}));
    return Math.min(1,totalIP/12);
  }catch{return 0;}
}

async function fetchLineupQ(id){
  if(!id)return 1.0;
  try{const data=await mlb(`/api/v1/teams/${id}/stats?stats=season&group=hitting&season=2026`);const ops=parseFloat(data.stats?.[0]?.splits?.[0]?.stat?.ops)||0.720;return Math.min(1.15,Math.max(0.85,ops/0.730));}
  catch{return 1.0;}
}

async function fetchStandings(){
  try{
    const data=await mlb('/api/v1/standings?leagueId=103,104&season=2026&standingsTypes=regularSeason');
    const map={};
    for(const rec of(data.records||[])){for(const t of(rec.teamRecords||[])){
      const rd=t.runDifferential||0;
      map[t.team.id]={wPct:parseFloat(t.winningPercentage||'.500'),wins:t.wins||0,losses:t.losses||0,streak:t.streak?.streakNumber||0,streakType:t.streak?.streakType||'W',runDiff:rd,elo:Math.round(1500+(parseFloat(t.winningPercentage||'.500')-0.5)*400+rd*0.8)};
    }}
    return map;
  }catch{return{};}
}

let oddsSnap={};
async function fetchOdds(){
  let fresh=[];
  try{fresh=await oddsApi(`/v4/sports/baseball_mlb/odds?apiKey=${ODDS_KEY}&regions=us&markets=h2h,spreads,totals&oddsFormat=american&bookmakers=${BOOKS.join(',')}`)||[];}
  catch(e){console.warn('Odds:',e);}
  const movements={};
  for(const g of fresh){
    const key=g.id;
    if(oddsSnap[key]){const prev=oddsSnap[key],moves=[];for(const bm of(g.bookmakers||[])){const pb=prev[bm.key];if(!pb)continue;for(const mkt of(bm.markets||[])){if(mkt.key!=='h2h')continue;for(const o of(mkt.outcomes||[])){const pp=pb[o.name];if(pp&&Math.abs(o.price-pp)>=5)moves.push(`${BNAMES[bm.key]||bm.key}: ${o.name} ${pp>0?'+':''}${pp}→${o.price>0?'+':''}${o.price}`);}}}if(moves.length)movements[key]=moves;}
    const snap={};for(const bm of(g.bookmakers||[])){snap[bm.key]={};for(const mkt of(bm.markets||[])){if(mkt.key==='h2h')for(const o of(mkt.outcomes||[]))snap[bm.key][o.name]=o.price;}}oddsSnap[key]=snap;
  }
  return{data:fresh,movements};
}

function findOdds(od,away,home){if(!od?.length)return null;const n=s=>s.toLowerCase().replace(/\s+/g,'').replace('athletics','as');const aN=n(away),hN=n(home);return od.find(g=>{const ta=n(g.away_team||''),th=n(g.home_team||'');return(ta.includes(aN.slice(0,6))||aN.includes(ta.slice(0,6)))&&(th.includes(hN.slice(0,6))||hN.includes(th.slice(0,6)));});}

function parseOdds(go,away,home){
  if(!go)return{ml:{},rl:{},total:{}};
  const ml={},rl={},total={};
  for(const bm of(go.bookmakers||[])){const k=bm.key;for(const mkt of(bm.markets||[])){
    if(mkt.key==='h2h')for(const o of(mkt.outcomes||[])){if(!ml[k])ml[k]={};if(o.name===home||o.name.toLowerCase().includes(home.split(' ').slice(-1)[0].toLowerCase()))ml[k].home=o.price;else ml[k].away=o.price;}
    if(mkt.key==='spreads')for(const o of(mkt.outcomes||[])){if(o.name===home||o.name.toLowerCase().includes(home.split(' ').slice(-1)[0].toLowerCase()))rl[k]={price:o.price,point:o.point};else rl[k+'_a']={price:o.price,point:o.point};}
    if(mkt.key==='totals')for(const o of(mkt.outcomes||[])){if(!total[k])total[k]={};total[k][o.name.toLowerCase()]={price:o.price,point:o.point};}
  }}
  return{ml,rl,total};
}

function getMarketConsensus(oddsMap,side){
  const probs=[];
  for(const v of Object.values(oddsMap)){const price=side==='home'?v.home:v.away;const p=a2p(price);if(p&&p>0.1&&p<0.99)probs.push(p);}
  if(!probs.length)return null;
  const avg=probs.reduce((a,b)=>a+b,0)/probs.length;
  return avg*0.955; // devig
}
function getTotalMarketConsensus(totalOdds,side){
  const probs=[];
  for(const v of Object.values(totalOdds)){const o=v[side];if(!o)continue;const p=a2p(o.price);if(p&&p>0.1&&p<0.99)probs.push(p);}
  if(!probs.length)return null;
  return probs.reduce((a,b)=>a+b,0)/probs.length*0.955;
}

async function init(){
  setStatus('loading','⟳ LOADING','CONNECTING...');
  setBanner('loading','⏳ Connecting to MLB API + Odds API...');
  let schedGames=[],schedDate='';
  try{
    const{games,date}=await fetchSchedule();
    schedGames=games;schedDate=date;
    setStatus('partial','◑ LIVE SCHEDULE','ENRICHING...');
    setBanner('partial','✓ Schedule loaded — fetching pitcher stats, form, rest, H2H, rolling offense, umpire...');
    populateGames(schedGames,schedDate);
  }catch(e){
    console.warn('Schedule:',e);
    const fb=getFallback();schedGames=fb.games;schedDate=fb.date;
    setStatus('offline','⚠ OFFLINE','FALLBACK DATA');
    setBanner('offline','⚠ MLB API unreachable — using fallback slate');
    appGames=schedGames.map(g=>({...g}));populateGames(appGames,schedDate);populatePlayers();return;
  }
  const[standings,oddsResult,...enriched]=await Promise.all([fetchStandings(),fetchOdds(),...schedGames.map(enrichGame)]);
  appStandings=standings;appOddsData=oddsResult;appGames=enriched;
  const hasLive=enriched.some(g=>g.awayLiveSP||g.homeLiveSP||g.awayTS);
  const hasOdds=oddsResult.data&&oddsResult.data.length>0;
  setStatus(hasLive?'live':'partial',hasLive?'● LIVE DATA':'◑ PARTIAL',hasOdds?'MLB + ODDS API':'MLB API');
  setBanner(hasLive?'live':'partial',`✅ ${hasLive?'Live MLB data active':'Schedule loaded'}${hasOdds?' · '+oddsResult.data.length+' games · Umpire zone · Pitcher rest · Rolling offense · H2H splits':''}`);
  populateGames(appGames,schedDate);populatePlayers();
}

      fetchPitcherStats(g.awayPId),fetchPitcherStats(g.homePId),
      fetchTeamStats(g.awayTId),fetchTeamStats(g.homeTId),
      fetchBullpenFatigue(g.awayTId),fetchBullpenFatigue(g.homeTId),
      fetchLineupQ(g.awayTId),fetchLineupQ(g.homeTId),
      fetchInjuries(g.awayTId),fetchInjuries(g.homeTId),
      fetchRollingOffense(g.awayTId),fetchRollingOffense(g.homeTId),

    // FIX #6: Pitcher career vs opponent (fetch after we know both IDs)
    const[awayVsHome,homeVsAway]=await Promise.all([
      fetchPitcherVsTeam(g.awayPId,g.homeTId),
      fetchPitcherVsTeam(g.homePId,g.awayTId),

function getFallback(){

function mSP(base, ln, live, isHome){
  if(!live)return{...base,effectiveERA:base.era,restAdj:0,homeERA:base.era,awayERA:base.era};
  const era=live.era??base.era,whip=live.whip??base.whip,k9=live.k9??base.k9,bb9=live.bb9??base.bb9;
  const fip=era&&bb9&&k9?parseFloat((era+(bb9-k9)*0.15).toFixed(2)):base.fip;
  // FIX: Use regressed fi_era from API (no more wild outliers)
  const fi_era=live.fi_era??base.fi_era;
  const l3era=live.l3era??null;
  const restAdj=live.restAdj??0;
  // FIX: Use home/away split ERA when available
  const homeERA=live.homeERA??era;
  const awayERA=live.awayERA??era;
  const splitERA=isHome?homeERA:awayERA;
  // Effective ERA: blend season ERA (40%), L3 era (30% if available), home/away split (30%)
  let effectiveERA=era;
  if(l3era){effectiveERA=era*0.40+l3era*0.30+splitERA*0.30;}
  else{effectiveERA=era*0.55+splitERA*0.45;}
  effectiveERA=parseFloat(effectiveERA.toFixed(2));
  // Apply rest adjustment
  effectiveERA=parseFloat(Math.max(1.5,effectiveERA-restAdj*0.3).toFixed(2));
  const nrfi=fi_era?Math.min(0.78,Math.max(0.42,base.nrfi+(base.fi_era-fi_era)*0.018)):base.nrfi;
  return{...base,name:ln||base.name,era,whip,k9,bb9,fip,fi_era,l3era,effectiveERA,restAdj,homeERA,awayERA,nrfi,live:true,id:live.id};
}

function analyzeGame(g){

  }
  if(homeVsAway&&homeVsAway.era&&homeVsAway.ip>=6){
    const h2hWeight=Math.min(0.35,homeVsAway.ip/50);

  const aRollingNote=awayRoll?.rpg?`L7: ${awayRoll.rpg.toFixed(2)} R/G (season: ${aSeasonRPG.toFixed(2)})`:null;
  const hRollingNote=homeRoll?.rpg?`L7: ${homeRoll.rpg.toFixed(2)} R/G (season: ${hSeasonRPG.toFixed(2)})`:null;

  const aOPS=awayTS?.ops??0.720,hOPS=homeTS?.ops??0.720;
  const aBERA=awayTS?.bERA??A.bera,hBERA=homeTS?.bERA??H.bera;
  const aSt=appStandings[awayTId],hSt=appStandings[homeTId];
  const aElo=aSt?.elo??1500,hElo=hSt?.elo??1500,aWP=aSt?.wPct??0.500,hWP=hSt?.wPct??0.500;
  const aStr=aSt?(aSt.streakType==='W'?aSt.streak:-aSt.streak):0,hStr=hSt?(hSt.streakType==='W'?hSt.streak:-hSt.streak):0;
  const eloDiff=(hElo+35)-aElo,eloH=1/(1+Math.pow(10,-eloDiff/400)),eloA=1-eloH;
  const aFQ=(5.0-AS.fip)/5.0,hFQ=(5.0-HS.fip)/5.0,aC=Math.max(0,1-(AS.bb9-2.0)*0.04),hC=Math.max(0,1-(HS.bb9-2.0)*0.04);
  const aBP2=(1-aBERA/6)*(1-awayBP*0.15),hBP2=(1-hBERA/6)*(1-homeBP*0.15);
  const h2h=H.h2h?.[away]||0;

  const hRestScore=HS.restAdj||0;

  const aScore=eloA*0.26+aWP*0.13+(1-aERA/6)*0.17+aFQ*0.06+aC*0.04+aBP2*0.11+(aRPG/5.5)*0.10+(aOPS/0.82)*0.06+Math.min(1,(aStr+6)/12)*0.04+aRestScore*0.03;
  const hScore=eloH*0.26+hWP*0.13+(1-hERA/6)*0.17+hFQ*0.06+hC*0.04+hBP2*0.11+(hRPG/5.5)*0.10+(hOPS/0.82)*0.06+Math.min(1,(hStr+6)/12)*0.04+hRestScore*0.03+(h2h>0?h2h*0.3:0)+0.028;

  const tot=aScore+hScore;

  const rlP=Math.min(0.80,Math.max(0.38,rlRaw)),rlC=probToConf(rlP);
  const favS=mlW.split(' ').slice(-1)[0],dogS=(favH?away:home).split(' ').slice(-1)[0];

  let wxR=0,wxN=0;
  if(!dome&&weather){const t=parseFloat(weather.temp)||68,w=parseFloat(weather.wind)||5,c=(weather.condition||'').toLowerCase();if(c.includes('out')){wxR+=Math.min(0.3,w*0.02);wxN-=0.015;}if(c.includes('in')){wxR-=Math.min(0.25,w*0.018);wxN+=0.02;}if(t<50){wxR-=0.15;wxN+=0.025;}if(t>75)wxR+=0.10;if(parseFloat(weather.precipitation)>25)wxR-=0.08;}

  const fAdj=((AS.fip-AS.era)+(HS.fip-HS.era))*0.10,expT=expA+expH+fAdj,line=8.5;

  const sc={ml:mlC,rl:rlC,total:tC,nrfi:nrfiC};
  const best=Object.entries(sc).sort((a,b)=>b[1]-a[1])[0][0];

  return{away,home,awayStarter:AS.name,homeStarter:HS.name,awayERA:AS.era,homeERA:HS.era,awayFIP:AS.fip,homeFIP:HS.fip,awayFI:fiERA_A,homeFI:fiERA_H,awayL3:AS.l3era,homeL3:HS.l3era,awayRestDays:AS.restDays||5,homeRestDays:HS.restDays||5,awayElo:aElo,homeElo:hElo,awayLive:AS.live||false,homeLive:HS.live||false,awayBPpct:Math.round(awayBP*100),homeBPpct:Math.round(homeBP*100),awayInj,homeInj,parkType:park.type,expTotal:expT.toFixed(1),dome,umpire,umpireKnown,umpNote:ump.note,mlWinner:mlW,mlProb:blendedML,rawMlProb:mlP,mlConf:mlC,mlOdds:toA(blendedML),hWinP:Math.round(hWin*100),aWinP:Math.round(aWin*100),rlPick,rlProb:rlP,rlConf:rlC,totalLine:line,totalPick:oP>=0.5?'OVER':'UNDER',totalConf:tC,overProb:oP,nrfiPick,nrfiProb:nrfiP,nrfiConf:nrfiC,bestBet:best,allLow,factors:fx.slice(0,7),parsedOdds:po,hasOdds:!!go,movements};
}

function analyzeProp(key,type,cLine){
  const p=PLAYERS[key];if(!p)return null;
  const ppCat=p.type==='pitcher'?'strikeouts':type;
  const ppLine=PP_LINES[ppCat]?.[key]??null;
  if(p.type==='pitcher'){
    const kpg=p.kpg9/9*6,line=cLine??parseFloat((kpg-.5).toFixed(1));
    const diff=(kpg-line)/line;
    const oP=Math.min(.88,Math.max(.12,.5+diff*1.2+(p.kpg9>10?0.04:0)));
    const c=probToConf(Math.max(oP,1-oP));
    const ppEdge=ppLine?((kpg-ppLine)*0.18*100).toFixed(1):null;
    return{player:p.name,team:p.team,prop:'Strikeouts',line,pick:oP>=.5?'OVER':'UNDER',conf:c,edge:c>=78?'Sharp':c>=66?'Moderate':'Lean',kellyPct:kellyOdds(Math.max(oP,1-oP),oP>=.5?-130:110),stat:`${p.kpg9} K/9 → ~${kpg.toFixed(1)} proj`,note:`${p.era} ERA · ${p.fip} FIP · ${p.whip} WHIP`,ppLine,ppEdge,factors:[`Projects ${kpg.toFixed(1)} Ks at ${p.kpg9} K/9 over ~6 IP`,`FIP ${p.fip} — true talent indicator`,kpg>line?`Line ${line} is ${((kpg-line)/line*100).toFixed(0)}% below projection — OVER value`:`Line ${line} is above projection — UNDER value`]};
  }
  const m={hits:{b:p.hitpg,d:1.5},rbis:{b:p.rbipg,d:.5},hr:{b:p.hrpg*10,d:.5},runs:{b:p.runspg,d:.5}};
  const pd=m[type]||m.hits,line=cLine??pd.d;
  const diff=(pd.b-line),trendBoost=(p.trend||0)*0.05;
  const oP=Math.min(.88,Math.max(.12,.5+diff*(type==='hr'?.40:.38)+trendBoost));
  const c=probToConf(Math.max(oP,1-oP));
  const lb={hits:'Hits',rbis:'RBIs',hr:'Home Runs',runs:'Runs'}[type]||'Hits';
  const ppEdge=ppLine!=null?((oP-0.5)*120+(pd.b-ppLine)*18).toFixed(1):null;
  return{player:p.name,team:p.team,prop:lb,line,pick:oP>=.5?'OVER':'UNDER',conf:c,edge:c>=78?'Sharp':c>=66?'Moderate':'Lean',kellyPct:kellyOdds(Math.max(oP,1-oP),oP>=.5?-130:110),stat:`${pd.b.toFixed(2)} ${lb}/G`,note:`.${Math.round(p.avg*1000)} AVG · .${Math.round(p.obp*1000)} OBP · .${Math.round(p.slg*1000)} SLG`,ppLine,ppEdge,factors:[`Season avg ${pd.b.toFixed(2)} ${lb.toLowerCase()}/game vs line of ${line} (${diff>0?'+':''}${diff.toFixed(2)} gap)`,`Splits: vR .${Math.round(p.vsR*1000)} · vL .${Math.round(p.vsL*1000)} · Home .${Math.round(p.home*1000)} · Away .${Math.round(p.away*1000)}`,p.trend===1?'Hot streak — trending up':p.trend===-1?'Cold — trending down':'Neutral form']};
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function bar(v){const c=cc(v);return`<div class="bar-wrap"><div class="bar-track"><div class="bar-fill" style="width:${v}%;background:${c}"></div></div><span class="bar-label" style="color:${c}">${v}%</span></div>`;}
function confBadge(v){const cls=v>=78?'conf-high':v>=66?'conf-med':'conf-low';const lbl=v>=78?'HIGH':v>=66?'MED':'LOW';return`<span class="conf-label ${cls}">${lbl} CONF</span>`;}
function chip(t,cls=''){return`<span class="chip ${cls}">${t}</span>`;}

function bcard(title,pick,conf,sub,hl,kp){
  const c=cc(conf||50);
  return`<div class="bcard" style="background:${hl?c+'18':'var(--bg3)'};border:1.5px solid ${hl?c:'var(--border)'}">
    <div class="bcard-head"><span class="bcard-title" style="color:${hl?c:'var(--dim2)'}">${title}${hl?' ★':''}</span>${confBadge(conf)}</div>
    <div class="bcard-pick" style="color:${pick==='PASS'?'var(--dim)':'var(--text)'}">${pick||'—'}</div>
    ${bar(conf||50)}
    ${sub?`<div class="bcard-sub">${sub}</div>`:''}
    ${kp>0?`<div class="bcard-kelly">Kelly: ${kp}% bankroll</div>`:''}
  </div>`;
}

function injuryHTML(aI,hI,away,home){
  if(!aI.length&&!hI.length)return'';
  let rows='';
  for(const p of aI)rows+=`<div class="inj-row"><span class="inj-dot">⚕</span><span class="inj-text">${away.split(' ').slice(-1)[0]}: ${p.name} (${p.pos}) — ${p.status}</span></div>`;
  for(const p of hI)rows+=`<div class="inj-row"><span class="inj-dot">⚕</span><span class="inj-text">${home.split(' ').slice(-1)[0]}: ${p.name} (${p.pos}) — ${p.status}</span></div>`;
  return`<div class="inj-banner"><div class="inj-title">🚑 INJURY REPORT</div>${rows}</div>`;
}
function lmHTML(mv){if(!mv||!mv.length)return'';return`<div class="lm-banner"><div class="lm-title">📈 LINE MOVEMENT</div>${mv.map(m=>`<div class="frow2"><span class="fdot" style="color:var(--yellow)">◆</span><span class="ftext">${m}</span></div>`).join('')}</div>`;}

function oddsHTML(r){
  if(!r.hasOdds)return`<div class="fbox"><div class="fbox-title">LIVE ODDS</div><div style="font-size:11px;color:var(--dim)">No odds data found for this game</div></div>`;
  const{ml,total}=r.parsedOdds,mlP=r.mlProb,mlFav=r.mlWinner===r.home?'home':'away';
  let mlRows='',bestML=null,bestBook='';
  for(const b of BOOKS){const v=ml[b];if(!v)continue;const price=mlFav==='home'?v.home:v.away;if(price==null)continue;const e=edgeCalc(mlP,price),en=parseFloat(e||0);const isBest=bestML===null||price>bestML;if(isBest){bestML=price;bestBook=b;}const k=kellyOdds(mlP,price);mlRows+=`<tr class="${isBest?'best-row':''}"><td>${BNAMES[b]||b}</td><td>${price>0?'+':''}${price}</td><td class="${en>3?'edge-pos':en<-2?'edge-neg':''}">${en>0?'+':''}${e}%</td><td>${k>0?k+'%':'—'}</td></tr>`;}
  const totSide=r.overProb>=0.5?'over':'under';let totRows='';
  for(const b of BOOKS){const v=total[b]?.[totSide];if(!v)continue;const e=edgeCalc(Math.max(r.overProb,1-r.overProb),v.price),en=parseFloat(e||0);totRows+=`<tr><td>${BNAMES[b]||b}</td><td>${totSide.toUpperCase()} ${v.point}</td><td>${v.price>0?'+':''}${v.price}</td><td class="${en>3?'edge-pos':en<-2?'edge-neg':''}">${en>0?'+':''}${e}%</td></tr>`;}
  let sharp='';if(bestML!==null){const be=parseFloat(edgeCalc(mlP,bestML)||0);if(be>3.5)sharp=`<div class="edge-banner sharp"><div class="edge-title">⚡ SHARP EDGE DETECTED</div><div class="edge-desc">${r.mlWinner} ML on ${BNAMES[bestBook]} — ${be.toFixed(1)}% edge vs implied · Kelly: ${kellyOdds(mlP,bestML)}% bankroll</div></div>`;}
  return`${sharp}<div class="fbox"><div class="fbox-title">LIVE ODDS — MONEYLINE (${r.mlWinner.split(' ').slice(-1)[0]})</div><table class="odds-table"><thead><tr><th>BOOK</th><th>ODDS</th><th>EDGE</th><th>KELLY</th></tr></thead><tbody>${mlRows||'<tr><td colspan="4" style="color:var(--dim)">No ML odds</td></tr>'}</tbody></table></div><div class="fbox"><div class="fbox-title">LIVE ODDS — TOTAL (${totSide.toUpperCase()} ${r.totalLine})</div><table class="odds-table"><thead><tr><th>BOOK</th><th>LINE</th><th>ODDS</th><th>EDGE</th></tr></thead><tbody>${totRows||'<tr><td colspan="4" style="color:var(--dim)">No total odds</td></tr>'}</tbody></table></div>`;
}

function ppHTML(r){
  if(r.ppLine==null)return'';
  const en=parseFloat(r.ppEdge||0),pc=r.pick==='OVER'?'pp-over':'pp-under';
  return`<div class="fbox"><div class="fbox-title">PRIZEPICKS COMPARISON</div><table class="pp-table"><thead><tr><th>PLAYER</th><th>PROP</th><th>PP LINE</th><th>PROJ</th><th>PICK</th><th>EDGE</th></tr></thead><tbody><tr><td>${r.player}</td><td>${r.prop}</td><td>${r.ppLine}</td><td>${r.stat.split(' ')[0]}</td><td class="${pc}">${r.pick}</td><td class="${en>5?'pp-edge':''}">${en>0?'+':''}${r.ppEdge}%</td></tr></tbody></table>${en>5?`<div style="font-size:10px;color:var(--yellow);margin-top:8px;font-family:monospace">⚡ Strong PrizePicks edge on this prop</div>`:''}</div>`;
}

function runGame(){
  const idx=parseInt(document.getElementById('gameSelect').value);if(isNaN(idx))return;
  const btn=document.getElementById('btnAnalyze');btn.textContent='⟳  ANALYZING...';btn.className='btn loading';btn.disabled=true;
  setTimeout(()=>{const g=appGames[idx];if(!g){btn.textContent='▶  GENERATE PICKS + LIVE ODDS';btn.className='btn red';btn.disabled=false;return;}const r=analyzeGame(g);renderGame(r);btn.textContent='▶  GENERATE PICKS + LIVE ODDS';btn.className='btn red';btn.disabled=false;},80);
}

function renderGame(r){
  const best=r.bestBet,mlK=kellyOdds(r.mlProb,parseInt(r.mlOdds));
  // FIX #3: Skip signal
  const skipHTML=r.allLow?`<div class="skip-banner">⚠ ALL BETS LOW CONFIDENCE — This is a coin flip game. Consider skipping or waiting for better line value.</div>`:'';
  const html=`
    ${injuryHTML(r.awayInj,r.homeInj,r.away,r.home)}
    ${lmHTML(r.movements)}
    ${skipHTML}
    <div class="card">
      <div style="font-size:15px;font-weight:900;font-family:monospace;color:var(--text);margin-bottom:12px">${r.away} @ ${r.home}</div>
      <div class="sp-grid">
        ${['away','home'].map(s=>{
          const nm=s==='away'?r.awayStarter:r.homeStarter;
          const era=s==='away'?r.awayERA:r.homeERA,fip=s==='away'?r.awayFIP:r.homeFIP;
          const fi=s==='away'?r.awayFI:r.homeFI,l3=s==='away'?r.awayL3:r.homeL3;
          const elo=s==='away'?r.awayElo:r.homeElo,live=s==='away'?r.awayLive:r.homeLive;
          const bp=s==='away'?r.awayBPpct:r.homeBPpct,rest=s==='away'?r.awayRestDays:r.homeRestDays;
          const fw=l3&&Math.abs(l3-era)>0.4;
          const fiColor=fi<=3.0?'var(--green)':fi>=4.5?'var(--red)':'var(--yellow)';
          const restColor=rest<=3?'var(--red)':rest>=7?'var(--green)':'var(--muted)';
          return`<div class="spbox ${live?'lv':''}">
            <div class="spbox-head"><span class="spbox-lbl">${s.toUpperCase()} SP</span><span class="spbox-tag" style="color:${live?'var(--green)':'var(--muted)'}">${live?'🟢 LIVE':'📊 BASE'}</span></div>
            <div class="spbox-name">${nm}</div>
            <div class="spbox-stats">ERA ${era} · FIP ${fip} · <span style="color:${fiColor}">1st-inn ${fi}</span></div>
            <div class="spbox-form" style="color:${fw?'var(--red)':'var(--yellow)'}">Elo ${elo}${l3?' · L3 '+l3+(fw?' ⚠':''):''}${bp>25?' · BP '+bp+'%':''}</div>
            <div class="spbox-adv"><span style="color:${restColor}">${rest}d rest</span></div>
          </div>`;
        }).join('')}
      </div>
      ${r.umpireKnown?`<div style="font-size:10px;color:var(--blue);font-family:monospace;margin-bottom:8px">🧑‍⚖️ HP Umpire: ${r.umpire} — ${r.umpNote}</div>`:''}
      <div>${chip(r.parkType)}${chip('PROJ: '+r.expTotal,'b')}${r.dome?chip('DOME'):''}${r.hasOdds?chip('ODDS LIVE','g'):''}${r.movements?.length?chip('LINE MOVED','o'):''}${best&&!r.allLow?chip('BEST: '+best.toUpperCase(),'y'):''}</div>
    </div>
    <div class="card">
      <div class="clabel">WIN PROBABILITY — ELO + FORM + MARKET</div>
      <div class="wp-grid">
        <div><div class="wp-name">${r.away.split(' ').slice(-1)[0]}</div><div class="wp-pct" style="color:${r.mlWinner===r.away?'var(--green)':'#374151'}">${r.aWinP}%</div></div>
        <div class="wp-vs">VS</div>
        <div style="text-align:right"><div class="wp-name" style="text-align:right">${r.home.split(' ').slice(-1)[0]}</div><div class="wp-pct" style="color:${r.mlWinner===r.home?'var(--green)':'#374151'}">${r.hWinP}%</div></div>
      </div>
      <div class="wp-kelly">MODEL LINE: ${r.mlOdds} · Kelly: ${mlK}% bankroll</div>
    </div>
    <div class="bet-grid">
      ${bcard('MONEYLINE',r.mlWinner.split(' ').slice(-1)[0],r.mlConf,`${Math.max(r.hWinP,r.aWinP)}% win prob`,best==='ml'&&!r.allLow,mlK)}
      ${bcard('RUN LINE',r.rlPick,r.rlConf,`${Math.round(r.rlProb*100)}% cover rate`,best==='rl'&&!r.allLow,0)}
      ${bcard(`TOTAL (${r.totalLine})`,r.totalPick,r.totalConf,`Proj: ${r.expTotal} runs`,best==='total'&&!r.allLow,0)}
      ${bcard('NRFI/YRFI',r.nrfiPick,r.nrfiConf,`1st-inn ERA: ${r.awayFI}/${r.homeFI}`,best==='nrfi'&&!r.allLow,0)}
    </div>
    ${oddsHTML(r)}
    <div class="fbox"><div class="fbox-title">ALGORITHM FACTORS</div>${r.factors.map(f=>`<div class="frow2"><span class="fdot" style="color:var(--accent)">◆</span><span class="ftext">${f}</span></div>`).join('')}</div>`;
  const el=document.getElementById('gameResult');el.innerHTML=html;el.classList.remove('hidden');el.scrollIntoView({behavior:'smooth',block:'start'});
}

function runProp(){
  const pk=document.getElementById('playerSelect').value,pt=document.getElementById('propType').value,ln=parseFloat(document.getElementById('propLine').value)||null;
  if(!pk)return;
  const r=analyzeProp(pk,PLAYERS[pk]?.type==='pitcher'?'strikeouts':pt,ln);
  if(r)renderProp(r);
}

function renderProp(r){
  const pc=r.pick==='OVER'?'#22d3a5':r.pick==='UNDER'?'#f87171':'#6b7280',ec=r.edge==='Sharp'?'var(--green)':r.edge==='Moderate'?'var(--yellow)':'var(--muted)';
  const html=`
    <div class="prop-header" style="background:var(--bg2);border:1px solid ${pc}55">
      <div class="prop-top">
        <div><div class="prop-name">${r.player}</div><div class="prop-meta">${r.team} · ${r.prop}</div><div class="prop-line">Line: ${r.line}</div><div class="prop-note">${r.note}</div></div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <div class="prop-badge" style="background:${pc}18;border:2px solid ${pc};color:${pc}">${r.pick}</div>
          <span class="chip" style="border-color:${ec};color:${ec}">${r.edge}</span>
        </div>
      </div>
      <div class="prop-conf-lbl">CONFIDENCE</div>${bar(r.conf)}
      <div class="prop-stat">${r.stat} · Kelly: ${r.kellyPct}% bankroll</div>
    </div>
    ${ppHTML(r)}
    <div class="fbox"><div class="fbox-title">ALGORITHM FACTORS</div>${r.factors.map(f=>`<div class="frow2"><span class="fdot" style="color:var(--blue2)">◆</span><span class="ftext">${f}</span></div>`).join('')}</div>`;
  const el=document.getElementById('propResult');el.innerHTML=html;el.classList.remove('hidden');el.scrollIntoView({behavior:'smooth',block:'start'});
}

const SC={live:'#22c55e',partial:'#fbbf24',offline:'#f87171',loading:'#60a5fa'};
function setStatus(t,txt,sub){const el=document.getElementById('statusText');el.textContent=txt;el.style.color=SC[t]||'#fff';document.getElementById('statusSub').textContent=sub;}
function setBanner(t,msg){const el=document.getElementById('apiBanner');el.className='banner '+t;el.innerHTML=(t==='loading'?'<span class="spin"></span>':'')+msg;}
function fmtDate(ds){if(!ds)return'';const[y,m,d]=ds.split('-').map(Number);return new Date(y,m-1,d).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});}
function populateGames(games,date){
  const sel=document.getElementById('gameSelect');
  document.getElementById('gameSelectLabel').textContent='SELECT GAME — '+(fmtDate(date)||'').toUpperCase();
  document.getElementById('dateLabel').textContent=(fmtDate(date)||'')+' · Elo · Rest · H2H · Rolling · Umpire';
  sel.innerHTML='<option value="">— Pick a game —</option>';
  games.forEach((g,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`${g.time} — ${g.away} @ ${g.home}`;sel.appendChild(o);});
}
function populatePlayers(){renderPlayers();}
function setFilter(cat,btn){curFilter=cat;document.querySelectorAll('.fchip').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderPlayers();}
function renderPlayers(){
  const sel=document.getElementById('playerSelect');
  const f=Object.entries(PLAYERS).filter(([,v])=>{if(v.type==='pitcher')return curFilter==='all'||curFilter==='pitcher';return curFilter==='all'||(v.cats&&v.cats.includes(curFilter));});
  document.getElementById('playerCountLabel').textContent=`SELECT PLAYER (${f.length})`;
  sel.innerHTML='<option value="">— Select a player —</option>';
  f.filter(([,v])=>!v.type).forEach(([k,v])=>{const o=document.createElement('option');o.value=k;o.textContent=`${v.name} (${v.team})`;sel.appendChild(o);});
  const pits=f.filter(([,v])=>v.type==='pitcher');
  if(pits.length){const og=document.createElement('optgroup');og.label='── PITCHERS ──';pits.forEach(([k,v])=>{const o=document.createElement('option');o.value=k;o.textContent=`${v.name} (${v.team})`;og.appendChild(o);});sel.appendChild(og);}
  sel.value='';document.getElementById('btnProp').disabled=true;document.getElementById('btnProp').className='btn';document.getElementById('propResult').classList.add('hidden');
}
function onGameChange(){const sel=document.getElementById('gameSelect'),btn=document.getElementById('btnAnalyze');if(sel.value!==''){sel.className='rv';btn.disabled=false;btn.className='btn red';}else{sel.className='';btn.disabled=true;btn.className='btn';}document.getElementById('gameResult').classList.add('hidden');}
function onPlayerChange(){const pk=document.getElementById('playerSelect').value,btn=document.getElementById('btnProp');if(pk){document.getElementById('playerSelect').className='bv';btn.disabled=false;btn.className='btn blue';document.getElementById('propTypeWrap').style.display=PLAYERS[pk]?.type==='pitcher'?'none':'block';}else{document.getElementById('playerSelect').className='';btn.disabled=true;btn.className='btn';}document.getElementById('propResult').classList.add('hidden');}
function switchTab(tab){curTab=tab;document.getElementById('panelLines').classList.toggle('hidden',tab!=='lines');document.getElementById('panelProps').classList.toggle('hidden',tab!=='props');document.getElementById('tabLines').className='tab'+(tab==='lines'?' al':'');document.getElementById('tabProps').className='tab'+(tab==='props'?' ap':'');}
init();
</script>
